<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ruby — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/lua.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ruby:#e0115f;--ruby-lt:#ff2e74;--ruby-dk:#8a0b3c;
  --bg0:#180209;--bg1:#2a0511;--bg2:#3d0a1c;
  --glass:rgba(255,46,116,.07);--glass-brd:rgba(255,46,116,.28);
  --text:#ffe9f0;--muted:#d78fa6;--dim:#9c5d72;
}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;color:var(--text);
  background:radial-gradient(circle at 20% 15%,#4a0c22 0%,transparent 55%),
             radial-gradient(circle at 85% 80%,#5c0f2b 0%,transparent 50%),
             linear-gradient(160deg,var(--bg0),var(--bg1) 55%,var(--bg2));
  min-height:100vh;overflow-x:hidden;position:relative;
}
/* floating ruby glints */
.glint{position:fixed;border-radius:50%;pointer-events:none;filter:blur(60px);opacity:.5;z-index:0}
.g1{width:340px;height:340px;background:#ff0f5c;top:-80px;left:-60px;animation:float1 14s ease-in-out infinite}
.g2{width:300px;height:300px;background:#b30a45;bottom:-70px;right:-40px;animation:float2 17s ease-in-out infinite}
@keyframes float1{50%{transform:translate(60px,50px) scale(1.15)}}
@keyframes float2{50%{transform:translate(-50px,-40px) scale(1.1)}}

/* ---------- landing ---------- */
#landing{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:26px;text-align:center;padding:24px;
  background:radial-gradient(circle at 50% 40%,rgba(224,17,95,.18),transparent 60%),
             linear-gradient(160deg,var(--bg0),var(--bg1) 60%,var(--bg2));
  transition:opacity .8s ease,visibility .8s ease}
#landing.hide{opacity:0;visibility:hidden}
.welcome{font-family:'Dancing Script',cursive;font-weight:700;line-height:1;
  font-size:clamp(3rem,11vw,7.5rem);
  background:linear-gradient(92deg,#ff2e74,#ff8fb3,#e0115f,#ff2e74);
  background-size:300% 100%;-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(0 4px 26px rgba(224,17,95,.55));
  animation:shine 6s linear infinite,rise 1.1s cubic-bezier(.2,.7,.3,1) both}
.welcome .to{display:block;font-size:.42em;letter-spacing:.02em;opacity:.85}
.welcome .name{display:block}
@keyframes shine{to{background-position:300% 0}}
@keyframes rise{from{opacity:0;transform:translateY(28px) scale(.96)}}
.tagline{color:var(--muted);font-size:clamp(.9rem,2.4vw,1.15rem);max-width:520px;
  animation:fadein 1.4s .5s both}
@keyframes fadein{from{opacity:0}}
.enter{margin-top:6px;border:1px solid var(--glass-brd);
  background:linear-gradient(135deg,rgba(255,46,116,.28),rgba(138,11,60,.28));
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#fff;font-size:1rem;font-weight:600;letter-spacing:.3px;
  padding:14px 40px;border-radius:99px;cursor:pointer;
  box-shadow:0 8px 30px rgba(224,17,95,.4),inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .15s,box-shadow .2s;animation:fadein 1.4s .8s both}
.enter:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 12px 40px rgba(224,17,95,.6),inset 0 1px 0 rgba(255,255,255,.35)}
.enter:active{transform:translateY(0) scale(.99)}
.gem{width:16px;height:16px;display:inline-block;vertical-align:-2px;margin-right:8px}

/* ---------- app ---------- */
#app{position:relative;z-index:10;display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto;opacity:0;transition:opacity .8s ease .2s}
#app.show{opacity:1}
header.bar{display:flex;align-items:center;gap:12px;padding:16px 22px;
  border-bottom:1px solid var(--glass-brd);
  background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
header.bar .logo{font-family:'Dancing Script',cursive;font-size:1.9rem;font-weight:700;
  background:linear-gradient(92deg,#ff2e74,#ff9cbb);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
header.bar .sub{color:var(--dim);font-size:.72rem;letter-spacing:.4px}
header.bar .newchat{margin-left:auto;border:1px solid var(--glass-brd);background:rgba(255,46,116,.1);
  color:var(--text);font-size:.75rem;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s}
header.bar .newchat:hover{background:rgba(255,46,116,.22)}

#chat{flex:1;overflow-y:auto;padding:24px 18px;display:flex;flex-direction:column;gap:18px;min-height:0}
.msg{display:flex;gap:12px;max-width:100%;animation:msgin .35s ease both}
@keyframes msgin{from{opacity:0;transform:translateY(8px)}}
.msg .av{width:34px;height:34px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}
.msg.user{flex-direction:row-reverse}
.msg.user .av{background:linear-gradient(135deg,#3d0a1c,#5c0f2b);border:1px solid var(--glass-brd);color:var(--muted)}
.msg.ai .av{background:linear-gradient(135deg,var(--ruby),var(--ruby-dk));color:#fff;box-shadow:0 3px 14px rgba(224,17,95,.5);font-family:'Dancing Script',cursive;font-size:1.2rem}
.bubble{padding:13px 16px;border-radius:16px;font-size:.92rem;line-height:1.6;
  border:1px solid var(--glass-brd);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  max-width:76%;word-wrap:break-word;overflow-wrap:anywhere}
.msg.user .bubble{background:linear-gradient(135deg,rgba(224,17,95,.32),rgba(138,11,60,.28));border-color:rgba(255,46,116,.4);border-bottom-right-radius:5px}
.msg.ai .bubble{background:var(--glass);border-bottom-left-radius:5px}
.bubble p{margin:0 0 9px}.bubble p:last-child{margin:0}
.bubble h1,.bubble h2,.bubble h3{margin:6px 0 8px;line-height:1.25}
.bubble h1{font-size:1.15rem}.bubble h2{font-size:1.05rem}.bubble h3{font-size:.98rem}
.bubble ul,.bubble ol{margin:0 0 9px;padding-left:20px}
.bubble li{margin:3px 0}
.bubble a{color:var(--ruby-lt)}
.bubble code{background:rgba(0,0,0,.35);padding:1px 6px;border-radius:5px;font-family:'Cascadia Code',Consolas,monospace;font-size:.85em}
.bubble pre{background:rgba(0,0,0,.42);border:1px solid rgba(255,46,116,.22);border-radius:10px;padding:12px 14px;margin:8px 0;overflow-x:auto}
.bubble pre code{background:none;padding:0;font-size:.82rem;line-height:1.55;color:#ffdbe6}
.bubble blockquote{border-left:3px solid var(--ruby);padding-left:12px;color:var(--muted);margin:6px 0}

.typing{display:flex;gap:5px;padding:6px 2px}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--ruby-lt);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* composer */
.composer{padding:14px 18px 20px;border-top:1px solid var(--glass-brd);
  background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.composer .box{display:flex;align-items:flex-end;gap:10px;
  border:1px solid var(--glass-brd);border-radius:18px;padding:8px 8px 8px 16px;
  background:rgba(0,0,0,.28);transition:border-color .2s,box-shadow .2s}
.composer .box:focus-within{border-color:var(--ruby);box-shadow:0 0 0 3px rgba(224,17,95,.18)}
#input{flex:1;background:none;border:none;outline:none;color:var(--text);resize:none;
  font-family:inherit;font-size:.95rem;line-height:1.5;max-height:180px;padding:6px 0}
#input::placeholder{color:var(--dim)}
#send{flex-shrink:0;width:42px;height:42px;border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,var(--ruby),var(--ruby-dk));color:#fff;
  display:flex;align-items:center;justify-content:center;transition:.15s;
  box-shadow:0 4px 16px rgba(224,17,95,.45)}
#send:hover:not(:disabled){transform:scale(1.06)}
#send:disabled{opacity:.4;cursor:not-allowed}
.hint{text-align:center;color:var(--dim);font-size:.68rem;margin-top:8px}
::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:rgba(255,46,116,.3);border-radius:9px}

/* code block chrome */
.codewrap{position:relative;margin:8px 0}
.codewrap .codebar{display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,46,116,.22);border-bottom:none;
  border-radius:10px 10px 0 0;padding:5px 10px;font-size:.7rem;color:var(--muted)}
.codewrap .codebar .lang{text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.codewrap .copybtn{border:1px solid var(--glass-brd);background:rgba(255,46,116,.12);
  color:var(--text);font-size:.68rem;font-weight:600;padding:3px 9px;border-radius:6px;cursor:pointer;transition:.15s}
.codewrap .copybtn:hover{background:rgba(255,46,116,.26)}
.codewrap pre{margin:0!important;border-radius:0 0 10px 10px!important}

/* file commit toolbar under an AI bubble */
.filebar{margin-top:10px;display:flex;flex-wrap:wrap;align-items:center;gap:8px;
  padding-top:10px;border-top:1px dashed rgba(255,46,116,.25)}
.filebar .files{color:var(--muted);font-size:.72rem}
.filebar .files code{font-size:.72rem}
.commitbtn{border:1px solid var(--glass-brd);
  background:linear-gradient(135deg,rgba(255,46,116,.3),rgba(138,11,60,.3));
  color:#fff;font-size:.74rem;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;transition:.15s}
.commitbtn:hover{transform:translateY(-1px)}

/* modal */
.modal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  background:rgba(10,1,5,.6);backdrop-filter:blur(4px);padding:20px}
.modal.show{display:flex}
.modal .card{width:100%;max-width:440px;border:1px solid var(--glass-brd);border-radius:18px;
  background:linear-gradient(160deg,#2a0511,#3d0a1c);box-shadow:0 20px 60px rgba(0,0,0,.55);
  padding:22px;animation:rise .35s ease both}
.modal h3{font-family:'Dancing Script',cursive;font-size:1.6rem;font-weight:700;
  background:linear-gradient(92deg,#ff2e74,#ff9cbb);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.modal .desc{color:var(--muted);font-size:.76rem;margin-bottom:14px}
.modal label{display:block;color:var(--dim);font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin:10px 0 4px}
.modal input,.modal textarea{width:100%;background:rgba(0,0,0,.32);border:1px solid var(--glass-brd);
  border-radius:9px;color:var(--text);font-family:inherit;font-size:.85rem;padding:9px 11px;outline:none;transition:border-color .15s}
.modal input:focus,.modal textarea:focus{border-color:var(--ruby)}
.modal .row{display:flex;gap:10px}.modal .row>div{flex:1}
.modal .filelist{margin:6px 0 2px;font-size:.72rem;color:var(--muted);max-height:80px;overflow:auto}
.modal .filelist code{display:block;padding:1px 0}
.modal .actions{display:flex;gap:10px;margin-top:16px}
.modal .actions button{flex:1;border-radius:10px;padding:10px;font-weight:600;font-size:.82rem;cursor:pointer;border:1px solid var(--glass-brd)}
.modal .cancel{background:rgba(255,255,255,.06);color:var(--muted)}
.modal .go{background:linear-gradient(135deg,var(--ruby),var(--ruby-dk));color:#fff;border:none}
.modal .go:disabled{opacity:.5;cursor:not-allowed}
.modal .result{margin-top:12px;font-size:.8rem;line-height:1.5;word-break:break-word}
.modal .result a{color:var(--ruby-lt);font-weight:600}
.modal .result.err{color:#ffb4c6}
</style>
</head>
<body>
<div class="glint g1"></div>
<div class="glint g2"></div>

<div id="landing">
  <div class="welcome"><span class="to">Welcome to</span><span class="name">Ruby</span></div>
  <p class="tagline">Your ruby-hearted AI companion. Ask me anything — Lua, Roblox scripting, code, ideas, or just chat.</p>
  <button class="enter" id="enterBtn">
    <svg class="gem" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"><path d="M6 3h12l4 6-10 12L2 9z"/><path d="M2 9h20M12 3v18M8 9l4-6 4 6"/></svg>
    Enter Ruby
  </button>
</div>

<div id="app">
  <header class="bar">
    <div>
      <div class="logo">Ruby</div>
      <div class="sub">AI ASSISTANT</div>
    </div>
    <button class="newchat" id="newChat">＋ New chat</button>
  </header>
  <div id="chat"></div>
  <div class="composer">
    <div class="box">
      <textarea id="input" rows="1" placeholder="Message Ruby…  (Shift+Enter for newline)"></textarea>
      <button id="send" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>
      </button>
    </div>
    <div class="hint">Ruby can make mistakes. Double-check important code.</div>
  </div>
</div>

<div class="modal" id="ghModal">
  <div class="card">
    <h3>Commit to GitHub</h3>
    <div class="desc">Ruby will create a new branch, commit these files, and open a pull request.</div>
    <div class="filelist" id="ghFiles"></div>
    <label>Repository (owner/name)</label>
    <input id="ghRepo" placeholder="octocat/hello-world" autocomplete="off" spellcheck="false"/>
    <div class="row">
      <div>
        <label>Base branch</label>
        <input id="ghBase" placeholder="default" autocomplete="off" spellcheck="false"/>
      </div>
      <div>
        <label>New branch</label>
        <input id="ghBranch" placeholder="ruby/auto" autocomplete="off" spellcheck="false"/>
      </div>
    </div>
    <label>Commit message</label>
    <input id="ghMsg" placeholder="Ruby: add files" autocomplete="off"/>
    <div class="result" id="ghResult" style="display:none"></div>
    <div class="actions">
      <button class="cancel" id="ghCancel">Cancel</button>
      <button class="go" id="ghGo">Commit &amp; open PR</button>
    </div>
  </div>
</div>

<script>
const landing=document.getElementById('landing');
const app=document.getElementById('app');
const chat=document.getElementById('chat');
const input=document.getElementById('input');
const send=document.getElementById('send');

document.getElementById('enterBtn').addEventListener('click',()=>{
  landing.classList.add('hide');
  app.classList.add('show');
  setTimeout(()=>input.focus(),400);
  if(!history.length) greet();
});
document.getElementById('newChat').addEventListener('click',()=>{
  history.length=0;chat.innerHTML='';greet();input.focus();
});

marked.setOptions({
  breaks:true,gfm:true,
  highlight:(code,lang)=>{
    try{
      if(lang&&window.hljs&&hljs.getLanguage(lang))return hljs.highlight(code,{language:lang}).value;
      if(window.hljs)return hljs.highlightAuto(code).value;
    }catch(e){}
    return code;
  }
});

// conversation history sent to the API
const history=[];

function greet(){
  addBubble('ai',"Hi, I'm **Ruby** 💎\n\nAsk me anything — I'm a world-class coder across **Lua**, **TypeScript**, **Python** and more. Paste code, describe a bug, or ask me to build something. When I write files, I can **commit them to GitHub** and open a PR for you.");
}

// Extract file blocks: a `path` line (inline code or plain) immediately before a fenced block.
function extractFiles(markdown){
  const files=[];
  const lines=markdown.split('\n');
  for(let i=0;i<lines.length;i++){
    const m=lines[i].match(/^```([\w.+-]*)\s*$/);
    if(!m)continue;
    // find prior non-empty line as a candidate path
    let p=i-1;while(p>=0&&lines[p].trim()==='')p--;
    let path=null;
    if(p>=0){
      const raw=lines[p].trim().replace(/^`|`$/g,'').replace(/^\*\*|\*\*$/g,'').trim();
      if(/^[\w./-]+\.[\w]+$/.test(raw)&&raw.includes('.')&&!raw.includes(' '))path=raw;
    }
    // collect body until closing fence
    const buf=[];let j=i+1;
    for(;j<lines.length;j++){if(/^```\s*$/.test(lines[j]))break;buf.push(lines[j]);}
    if(path)files.push({path,content:buf.join('\n')});
    i=j;
  }
  return files;
}

function addBubble(role,markdown){
  const msg=document.createElement('div');
  msg.className='msg '+(role==='user'?'user':'ai');
  const av=document.createElement('div');av.className='av';
  av.textContent=role==='user'?'You':'R';
  const bubble=document.createElement('div');bubble.className='bubble';
  bubble.innerHTML=role==='user'?escapeHtml(markdown):marked.parse(markdown);
  if(role!=='user'){
    decorateCode(bubble);
    const files=extractFiles(markdown);
    if(files.length)addFileBar(bubble,files);
  }
  msg.appendChild(av);msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
  return bubble;
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])).replace(/\n/g,'<br>');}

// wrap each <pre> with a bar showing the language + a copy button
function decorateCode(bubble){
  bubble.querySelectorAll('pre').forEach(pre=>{
    const code=pre.querySelector('code');if(!code)return;
    const cls=[...code.classList].find(c=>c.startsWith('language-'));
    const lang=cls?cls.slice(9):'code';
    const wrap=document.createElement('div');wrap.className='codewrap';
    const bar=document.createElement('div');bar.className='codebar';
    bar.innerHTML='<span class="lang">'+escapeHtml(lang)+'</span>';
    const btn=document.createElement('button');btn.className='copybtn';btn.textContent='Copy';
    btn.addEventListener('click',()=>{
      navigator.clipboard.writeText(code.innerText).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1400);});
    });
    bar.appendChild(btn);
    pre.parentNode.insertBefore(wrap,pre);wrap.appendChild(bar);wrap.appendChild(pre);
  });
}

function addFileBar(bubble,files){
  const bar=document.createElement('div');bar.className='filebar';
  const label=document.createElement('span');label.className='files';
  label.innerHTML=files.length+' file'+(files.length>1?'s':'')+': '+files.map(f=>'<code>'+escapeHtml(f.path)+'</code>').join(', ');
  const btn=document.createElement('button');btn.className='commitbtn';
  btn.textContent='💎 Commit to GitHub';
  btn.addEventListener('click',()=>openGh(files));
  bar.appendChild(label);bar.appendChild(btn);
  bubble.appendChild(bar);
}

function showTyping(){
  const msg=document.createElement('div');msg.className='msg ai';msg.id='typing';
  msg.innerHTML='<div class="av">R</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(msg);chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function sendMessage(){
  const text=input.value.trim();
  if(!text)return;
  input.value='';autoGrow();
  send.disabled=true;
  addBubble('user',text);
  history.push({role:'user',content:text});
  showTyping();
  try{
    const r=await fetch('/api/ruby',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history})
    });
    const d=await r.json();
    hideTyping();
    if(d.reply){
      addBubble('ai',d.reply);
      history.push({role:'assistant',content:d.reply});
    }else{
      addBubble('ai','⚠️ '+(d.error||'Something went wrong. Please try again.'));
    }
  }catch(e){
    hideTyping();
    addBubble('ai','⚠️ Network error — I could not reach the server. Please try again.');
  }finally{
    send.disabled=false;input.focus();
  }
}

send.addEventListener('click',sendMessage);
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});

/* ---------- GitHub commit modal ---------- */
const ghModal=document.getElementById('ghModal');
const ghResult=document.getElementById('ghResult');
const ghGo=document.getElementById('ghGo');
let ghPending=[];
function openGh(files){
  ghPending=files;
  document.getElementById('ghFiles').innerHTML=files.map(f=>'<code>'+escapeHtml(f.path)+'</code>').join('');
  document.getElementById('ghMsg').value='Ruby: add '+files.map(f=>f.path.split('/').pop()).join(', ');
  ghResult.style.display='none';ghResult.className='result';ghResult.innerHTML='';
  ghModal.classList.add('show');
  document.getElementById('ghRepo').focus();
}
function closeGh(){ghModal.classList.remove('show');}
document.getElementById('ghCancel').addEventListener('click',closeGh);
ghModal.addEventListener('click',e=>{if(e.target===ghModal)closeGh();});

ghGo.addEventListener('click',async()=>{
  const repo=document.getElementById('ghRepo').value.trim();
  if(!repo){ghResult.style.display='block';ghResult.className='result err';ghResult.textContent='Enter a repository (owner/name).';return;}
  const payload={
    repo,
    files:ghPending,
    base:document.getElementById('ghBase').value.trim()||undefined,
    branch:document.getElementById('ghBranch').value.trim()||undefined,
    message:document.getElementById('ghMsg').value.trim()||undefined,
  };
  ghGo.disabled=true;ghGo.textContent='Committing…';
  ghResult.style.display='block';ghResult.className='result';ghResult.textContent='Creating branch, committing files, opening PR…';
  try{
    const r=await fetch('/api/github',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const d=await r.json();
    if(r.ok&&d.prUrl){
      ghResult.className='result';
      ghResult.innerHTML='✅ Opened PR #'+d.prNumber+' on branch <code>'+escapeHtml(d.branch)+'</code>.<br><a href="'+d.prUrl+'" target="_blank" rel="noopener">'+escapeHtml(d.prUrl)+'</a>';
    }else{
      ghResult.className='result err';
      ghResult.textContent='⚠️ '+(d.error||('GitHub returned '+r.status));
    }
  }catch(e){
    ghResult.className='result err';ghResult.textContent='⚠️ Network error reaching the server.';
  }finally{
    ghGo.disabled=false;ghGo.textContent='Commit & open PR';
  }
});
function autoGrow(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,180)+'px';}
input.addEventListener('input',autoGrow);
</script>
</body>
