<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Builder · Roblox Lua</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/25/25231.png" />
<style>
  :root {
    --bg: #000000;
    --glass: rgba(255,255,255,0.02);
    --glass2: rgba(255,255,255,0.04);
    --glass3: rgba(255,255,255,0.06);
    --hairline: rgba(255,255,255,0.08);
    --hairline2: rgba(255,255,255,0.14);
    --text: #ffffff;
    --text-soft: rgba(255,255,255,0.72);
    --text-muted: rgba(255,255,255,0.42);
    --text-faint: rgba(255,255,255,0.26);
    --accent: #ffffff;
    --blue: #3b82f6;
    --green: #34d399;
    --purple: #c084fc;
    --amber: #fbbf24;
    --orange: #fb923c;
    --red: #f87171;
    --pill: 9999px;
    --r-lg: 22px;
    --r-md: 16px;
    --r-sm: 11px;
    --font-sans: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
    --font-mono: ui-monospace, 'SFMono-Regular', 'JetBrains Mono', Menlo, Monaco, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: var(--font-sans);
    background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Grid background ── */
  #grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 40%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 40%, transparent 100%);
  }
  #glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 400px; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.06), transparent 70%);
    filter: blur(40px);
  }

  /* ── Top Bar ── */
  #topbar {
    position: relative; z-index: 10;
    height: 56px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--hairline);
    display: flex; align-items: center; padding: 0 18px; gap: 14px;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 30px; height: 30px;
    background: #fff; color: #000;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 800;
  }
  .logo span {
    font-weight: 600; font-size: 15px; letter-spacing: -0.3px;
    background: linear-gradient(45deg, #fff, rgba(255,255,255,0.65));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .topbar-sep { width: 1px; height: 22px; background: var(--hairline2); }
  #model-select {
    background: var(--glass2);
    border: 1px solid var(--hairline);
    color: var(--text-soft);
    padding: 7px 14px; border-radius: var(--pill);
    font-size: 12px; font-family: var(--font-mono); cursor: pointer; outline: none;
    transition: all 0.2s;
  }
  #model-select:hover { background: var(--glass3); border-color: var(--hairline2); }
  #model-select:focus { border-color: rgba(255,255,255,0.3); color: var(--text); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .badge {
    font-size: 11px; padding: 5px 12px; border-radius: var(--pill); font-weight: 500;
    background: var(--glass2); border: 1px solid var(--hairline); color: var(--text-soft);
    display: flex; align-items: center; gap: 5px;
  }
  #status-indicator {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }
  .btn {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: var(--pill); border: 1px solid var(--hairline);
    background: var(--glass2); color: var(--text-soft); font-size: 12.5px;
    cursor: pointer; transition: all 0.2s; font-family: var(--font-sans);
  }
  .btn:hover { background: var(--glass3); border-color: var(--hairline2); color: var(--text); }
  .btn-primary {
    background: #fff; color: #000; border-color: #fff; font-weight: 600;
  }
  .btn-primary:hover { background: rgba(255,255,255,0.88); border-color: rgba(255,255,255,0.88); color: #000; }

  /* ── Main 3-panel layout ── */
  #main { position: relative; z-index: 5; display: flex; height: calc(100vh - 56px); overflow: hidden; padding: 12px; gap: 0; }

  /* ── Resizer ── */
  .resizer {
    width: 12px; cursor: col-resize; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .resizer::after {
    content: ''; width: 2px; height: 38px; border-radius: 2px;
    background: var(--hairline); transition: all 0.2s;
  }
  .resizer:hover::after, .resizer.active::after { background: rgba(255,255,255,0.4); height: 56px; }

  /* ── Panel base (glass card) ── */
  .panel {
    display: flex; flex-direction: column; overflow: hidden; min-width: 220px;
    background: var(--glass);
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }

  .panel-header {
    height: 46px; border-bottom: 1px solid var(--hairline);
    display: flex; align-items: center; padding: 0 18px; gap: 9px;
    font-size: 12px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 0.3px; flex-shrink: 0;
    font-family: var(--font-mono);
  }
  .panel-header svg { opacity: 0.5; }

  /* ══ CHAT PANEL ══ */
  #chat-panel { width: 360px; flex-shrink: 0; }
  #chat-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 14px;
    scrollbar-width: thin;
  }
  .msg { display: flex; flex-direction: column; gap: 5px; max-width: 100%; }
  .msg-user { align-items: flex-end; }
  .msg-ai { align-items: flex-start; }
  .msg-bubble {
    max-width: 92%; padding: 12px 15px; border-radius: 18px;
    font-size: 13.5px; line-height: 1.6; word-break: break-word;
  }
  .msg-user .msg-bubble {
    background: #fff; color: #000;
    border-bottom-right-radius: 5px; font-weight: 450;
  }
  .msg-ai .msg-bubble {
    background: var(--glass2); color: var(--text-soft);
    border: 1px solid var(--hairline); border-bottom-left-radius: 5px;
  }
  .msg-ai .msg-bubble pre {
    background: rgba(0,0,0,0.5); border: 1px solid var(--hairline);
    border-radius: 12px; padding: 12px; overflow-x: auto; margin: 9px 0;
    font-family: var(--font-mono); font-size: 12px; line-height: 1.55;
  }
  .msg-ai .msg-bubble code:not(pre code) {
    background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 5px;
    font-family: var(--font-mono); font-size: 12px;
  }
  .msg-ai .msg-bubble p { margin: 6px 0; }
  .msg-ai .msg-bubble ul, .msg-ai .msg-bubble ol { padding-left: 18px; margin: 6px 0; }
  .msg-ai .msg-bubble li { margin: 4px 0; }
  .msg-ai .msg-bubble strong { color: #fff; font-weight: 600; }
  .msg-ai .msg-bubble h1, .msg-ai .msg-bubble h2, .msg-ai .msg-bubble h3 {
    font-size: 14px; margin: 10px 0 4px; color: #fff;
  }
  .msg-meta { font-size: 10px; color: var(--text-faint); padding: 0 6px; font-family: var(--font-mono); }
  .code-apply-bar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .code-apply-btn {
    font-size: 11.5px; padding: 7px 14px; border-radius: var(--pill);
    background: #fff; border: none; color: #000; cursor: pointer; font-weight: 600;
    transition: all 0.2s;
  }
  .code-apply-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,255,255,0.15); }

  .typing-indicator { display: flex; gap: 5px; padding: 14px 16px; align-items: center; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.6); animation: typing 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100% { opacity: 0.25; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }

  #chat-input-area { padding: 14px; border-top: 1px solid var(--hairline); flex-shrink: 0; }
  #chat-input-wrap {
    display: flex; gap: 9px; align-items: flex-end;
    background: var(--glass2); border: 1px solid var(--hairline);
    border-radius: var(--r-md); padding: 10px 12px; transition: all 0.2s;
  }
  #chat-input-wrap:focus-within { border-color: rgba(255,255,255,0.28); background: var(--glass3); }
  #chat-input {
    flex: 1; background: none; border: none; outline: none; color: var(--text);
    font-size: 13.5px; line-height: 1.5; resize: none; max-height: 120px; font-family: inherit;
  }
  #chat-input::placeholder { color: var(--text-faint); }
  #send-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #fff; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s; color: #000;
  }
  #send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(255,255,255,0.2); }
  #send-btn:disabled { background: var(--glass3); color: var(--text-faint); cursor: not-allowed; transform: none; box-shadow: none; }
  .quick-actions { display: flex; gap: 7px; margin-bottom: 11px; flex-wrap: wrap; }
  .quick-btn {
    font-size: 11.5px; padding: 6px 13px; border-radius: var(--pill);
    background: var(--glass2); border: 1px solid var(--hairline); color: var(--text-muted);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .quick-btn:hover { border-color: var(--hairline2); color: var(--text); background: var(--glass3); }

  /* Lua file drawer */
  #lua-drawer { border-top: 1px solid var(--hairline); flex-shrink: 0; }
  #lua-drawer-header {
    padding: 11px 18px; font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
    font-weight: 500; letter-spacing: 0.3px; font-family: var(--font-mono);
  }
  #lua-drawer-header:hover { color: var(--text); }
  #lua-drawer-chevron { transition: transform 0.25s; margin-left: auto; }
  #lua-file-list { max-height: 170px; overflow-y: auto; padding: 4px 10px 10px; scrollbar-width: thin; }
  .lua-file-item {
    display: flex; align-items: center; gap: 9px; padding: 7px 10px;
    border-radius: var(--r-sm); cursor: pointer; font-size: 12px; transition: background 0.15s;
  }
  .lua-file-item:hover { background: var(--glass3); }
  .lua-file-name { color: var(--text-soft); flex: 1; font-family: var(--font-mono); }
  .lua-file-size { color: var(--text-faint); font-size: 10px; font-family: var(--font-mono); }
  .lua-file-load {
    font-size: 10px; color: var(--text-muted); padding: 2px 9px; border: 1px solid var(--hairline);
    border-radius: var(--pill); flex-shrink: 0;
  }
  .lua-file-load:hover { background: #fff; color: #000; border-color: #fff; }

  /* ══ PREVIEW PANEL ══ */
  #preview-panel { flex: 1; margin: 0 0px; }
  .preview-toolbar {
    height: 46px; border-bottom: 1px solid var(--hairline);
    display: flex; align-items: center; gap: 10px; padding: 0 14px; flex-shrink: 0;
  }
  .traffic-light { display: flex; gap: 7px; align-items: center; flex-shrink: 0; }
  .tl { width: 11px; height: 11px; border-radius: 50%; opacity: 0.9; }
  .tl-red { background: #ff5f57; } .tl-yellow { background: #ffbd2e; } .tl-green { background: #28c940; }
  #preview-url {
    flex: 1; background: var(--glass2); border: 1px solid var(--hairline); color: var(--text-muted);
    border-radius: var(--pill); padding: 6px 14px; font-size: 12px; font-family: var(--font-mono); outline: none;
  }
  #preview-url:focus { border-color: var(--hairline2); color: var(--text-soft); }
  #preview-refresh {
    background: var(--glass2); border: 1px solid var(--hairline); border-radius: 50%;
    width: 30px; height: 30px; color: var(--text-muted); cursor: pointer; font-size: 14px;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  #preview-refresh:hover { border-color: var(--hairline2); color: var(--text); transform: rotate(90deg); }
  .device-btns { display: flex; gap: 5px; }
  .device-btn {
    background: var(--glass2); border: 1px solid transparent; border-radius: var(--pill);
    color: var(--text-muted); padding: 5px 10px; cursor: pointer; font-size: 12px; transition: all 0.2s;
  }
  .device-btn.active, .device-btn:hover { border-color: var(--hairline2); color: var(--text); background: var(--glass3); }
  #preview-frame-wrap {
    flex: 1; overflow: hidden; background: #fff; position: relative;
    display: flex; align-items: center; justify-content: center;
    border-radius: 0 0 var(--r-lg) var(--r-lg);
  }
  #preview-iframe { width: 100%; height: 100%; border: none; display: block; background: #fff; }
  #preview-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg); flex-direction: column; gap: 16px; color: var(--text-muted); font-size: 13.5px;
  }
  #preview-overlay svg { opacity: 0.18; }
  #preview-overlay span { opacity: 0.4; font-family: var(--font-mono); }

  /* ══ CODE PANEL ══ */
  #code-panel { width: 440px; flex-shrink: 0; }
  .code-tabs { display: flex; border-bottom: 1px solid var(--hairline); flex-shrink: 0; overflow-x: auto; padding: 0 6px; }
  .code-tab {
    padding: 13px 16px; font-size: 12px; cursor: pointer; color: var(--text-muted);
    border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap;
    display: flex; align-items: center; gap: 7px; font-family: var(--font-mono);
  }
  .code-tab:hover { color: var(--text-soft); }
  .code-tab.active { color: var(--text); border-bottom-color: #fff; }
  .tab-dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-html { background: var(--orange); } .dot-css { background: var(--blue); }
  .dot-js { background: var(--amber); } .dot-lua { background: var(--purple); }
  #code-editor-wrap { flex: 1; position: relative; overflow: hidden; }
  #code-editor { width: 100%; height: 100%; }
  .code-actions {
    padding: 11px 14px; border-top: 1px solid var(--hairline);
    display: flex; gap: 9px; align-items: center; flex-shrink: 0; flex-wrap: wrap;
  }
  .code-stat { font-size: 11px; color: var(--text-faint); margin-left: auto; font-family: var(--font-mono); }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--hairline2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translate(-50%, 80px); z-index: 1000;
    background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--hairline2); border-radius: var(--pill); padding: 11px 22px;
    font-size: 13px; color: var(--text); opacity: 0; transition: all 0.3s cubic-bezier(0.2,0.8,0.2,1);
    pointer-events: none; display: flex; align-items: center; gap: 9px;
  }
  #toast.show { transform: translate(-50%, 0); opacity: 1; }
  #toast.success { border-color: rgba(52,211,153,0.5); }
  #toast.error { border-color: rgba(248,113,113,0.5); }

  .welcome-msg .msg-bubble {
    background: var(--glass3); border: 1px solid var(--hairline2);
  }

  /* ── Lua modal ── */
  #lua-modal {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
  }
  #lua-modal.open { display: flex; }
  #lua-modal-inner {
    background: rgba(12,12,12,0.95); border: 1px solid var(--hairline2);
    border-radius: var(--r-lg); width: 760px; max-width: 95vw; max-height: 82vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #lua-modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--hairline);
    display: flex; align-items: center; gap: 11px; font-weight: 500; font-size: 14px;
    font-family: var(--font-mono);
  }
  #lua-modal-close {
    margin-left: auto; background: var(--glass2); border: 1px solid var(--hairline); color: var(--text-muted);
    cursor: pointer; font-size: 16px; line-height: 1; width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  #lua-modal-close:hover { background: var(--glass3); color: var(--text); }
  #lua-modal-content {
    flex: 1; overflow: auto; padding: 18px; font-family: var(--font-mono); font-size: 12px;
    line-height: 1.65; color: var(--text-soft); background: rgba(0,0,0,0.4); white-space: pre; tab-size: 2;
  }
  #lua-modal-footer { padding: 13px 18px; border-top: 1px solid var(--hairline); display: flex; gap: 9px; }

  /* Syntax highlight in Lua modal */
  .kw { color: var(--purple); } .str { color: var(--green); }
  .cmt { color: var(--text-faint); font-style: italic; } .num { color: var(--orange); }
</style>
</head>
<body>

<div id="grid-bg"></div>
<div id="glow"></div>

<!-- ── Top Bar ── -->
<div id="topbar">
  <div class="logo">
    <div class="logo-icon">@</div>
    <span>AI Builder</span>
  </div>
  <div class="topbar-sep"></div>
  <select id="model-select">
    <option value="glm-4.7">GLM-4.7 · Balanced</option>
    <option value="glm-4.7-flash">GLM-4.7 Flash · Free</option>
    <option value="glm-4.5">GLM-4.5</option>
    <option value="glm-4.5-flash">GLM-4.5 Flash · Free</option>
    <option value="glm-5-turbo">GLM-5 Turbo</option>
  </select>
  <div class="topbar-right">
    <span class="badge">🔮 Roblox Lua</span>
    <span class="badge">Z.ai GLM</span>
    <div id="status-indicator" title="Connected"></div>
  </div>
</div>

<!-- ── Main Layout ── -->
<div id="main">

  <!-- ═══ CHAT PANEL ═══ -->
  <div class="panel" id="chat-panel">
    <div class="panel-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      AI CHAT
    </div>

    <div id="chat-messages"></div>

    <!-- Lua file drawer -->
    <div id="lua-drawer">
      <div id="lua-drawer-header" onclick="toggleLuaDrawer()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        LUA FILES
        <svg id="lua-drawer-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div id="lua-file-list" style="display:none;"></div>
    </div>

    <!-- Chat input -->
    <div id="chat-input-area">
      <div class="quick-actions" id="quick-actions">
        <button class="quick-btn" onclick="quickMsg('Create a dark glassmorphic dashboard UI with sidebar nav')">Dashboard</button>
        <button class="quick-btn" onclick="quickMsg('Create a clean landing page with hero section and features')">Landing</button>
        <button class="quick-btn" onclick="quickMsg('Add a Lua obfuscator form to the website')">Obfuscator</button>
        <button class="quick-btn" onclick="quickMsg('List all available Lua files and show me the obfuscate.lua tool')">Lua Tools</button>
      </div>
      <div id="chat-input-wrap">
        <textarea id="chat-input" placeholder="Describe what to build…" rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="resizer" id="resizer-1"></div>

  <!-- ═══ PREVIEW PANEL ═══ -->
  <div class="panel" id="preview-panel">
    <div class="preview-toolbar">
      <div class="traffic-light">
        <div class="tl tl-red"></div>
        <div class="tl tl-yellow"></div>
        <div class="tl tl-green"></div>
      </div>
      <input id="preview-url" readonly value="about:blank" />
      <button id="preview-refresh" onclick="refreshPreview()" title="Refresh">↺</button>
      <div class="device-btns">
        <button class="device-btn active" onclick="setDevice('desktop', this)" title="Desktop">🖥</button>
        <button class="device-btn" onclick="setDevice('tablet', this)" title="Tablet">📱</button>

<!-- Monaco Editor loader -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
//  APP STATE
// ─────────────────────────────────────────────────────────────────────────────
const state = {
  chatHistory: [],
  currentLang: 'html',
  editors: {},
  code: {
    html: '<!-- Your HTML will appear here -->\n',
    css:  '/* Your CSS will appear here */\n',
    javascript: '// Your JavaScript will appear here\n',
    lua: '-- Your Lua script will appear here\n'
  },
  isGenerating: false,
  currentLuaFile: null,
  luaFileContent: null,
  previewLive: false
};

// ─────────────────────────────────────────────────────────────────────────────
//  MONACO EDITOR SETUP
// ─────────────────────────────────────────────────────────────────────────────
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });

require(['vs/editor/editor.main'], function () {
  monaco.editor.defineTheme('pure-black', {
    base: 'vs-dark',
    inherit: true,
    rules: [
      { token: 'comment', foreground: '5a5a5a', fontStyle: 'italic' },
      { token: 'keyword', foreground: 'c084fc' },
      { token: 'string', foreground: '34d399' },
      { token: 'number', foreground: 'fb923c' },
    ],
    colors: {
      'editor.background': '#00000000',
      'editor.foreground': '#ffffff',
      'editor.lineHighlightBackground': '#ffffff08',
      'editorCursor.foreground': '#ffffff',
      'editor.selectionBackground': '#ffffff22',
      'editorLineNumber.foreground': '#ffffff30',
      'editorLineNumber.activeForeground': '#ffffff70',
    }
  });

  const langs = ['html', 'css', 'javascript', 'lua'];
  langs.forEach(lang => {
    const container = document.createElement('div');
    container.style.cssText = 'width:100%;height:100%;display:none;position:absolute;top:0;left:0;';
    container.id = 'editor-' + lang;
    document.getElementById('code-editor').appendChild(container);

    const ed = monaco.editor.create(container, {
      value: state.code[lang],
      language: lang === 'lua' ? 'lua' : lang,
      theme: 'pure-black',
      automaticLayout: true,
      fontSize: 13,
      fontFamily: "'JetBrains Mono', ui-monospace, monospace",
      fontLigatures: true,
      minimap: { enabled: false },
      scrollBeyondLastLine: false,
      renderLineHighlight: 'line',
      lineNumbers: 'on',
      tabSize: 2,
      wordWrap: 'off',
      padding: { top: 14 },
      bracketPairColorization: { enabled: true }
    });

    ed.onDidChangeModelContent(() => {
      state.code[lang] = ed.getValue();
      updateCodeStat();
    });

    state.editors[lang] = ed;
  });

  document.getElementById('editor-html').style.display = 'block';
  showWelcome();
  loadLuaFiles();
});

// ─────────────────────────────────────────────────────────────────────────────
//  TAB SWITCHING
// ─────────────────────────────────────────────────────────────────────────────
function switchTab(lang, el) {
  state.currentLang = lang;
  document.querySelectorAll('.code-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  Object.keys(state.editors).forEach(l => {
    document.getElementById('editor-' + l).style.display = l === lang ? 'block' : 'none';
  });
  updateCodeStat();
}

function updateCodeStat() {
  const lines = (state.code[state.currentLang] || '').split('\n').length;
  const chars = (state.code[state.currentLang] || '').length;
  document.getElementById('code-stat').textContent = `${lines} lines · ${chars} chars`;
}

// ─────────────────────────────────────────────────────────────────────────────
//  PREVIEW
// ─────────────────────────────────────────────────────────────────────────────
function buildPreviewDoc() {
  const html = state.code.html;
  const css = state.code.css;
  const js = state.code.javascript;

  if (/<html/i.test(html)) {
    let doc = html;
    if (!/<style/i.test(doc) && css.trim()) {
      doc = doc.replace('</head>', `<style>\n${css}\n</style>\n</head>`);
    }
    if (!/<script/i.test(doc) && js.trim()) {
      doc = doc.replace('</body>', `<script>\n${js}\n<\/script>\n</body>`);
    }
    return doc;
  }

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
${css}
</style>
</head>
<body>
${html}
<script>
${js}
<\/script>
</body>
</html>`;
}

function applyCode() {
  const doc = buildPreviewDoc();
  const iframe = document.getElementById('preview-iframe');
  const overlay = document.getElementById('preview-overlay');

  iframe.style.display = 'block';
  overlay.style.display = 'none';
  state.previewLive = true;

  iframe.srcdoc = doc;
  document.getElementById('preview-url').value = 'preview://localhost/index.html';
  showToast('Preview updated', 'success');
}

function refreshPreview() {
  if (!state.previewLive) return;
  applyCode();
}

function setDevice(device, el) {
  document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const wrap = document.getElementById('preview-frame-wrap');
  const iframe = document.getElementById('preview-iframe');
  if (device === 'desktop') {
    iframe.style.width = '100%'; iframe.style.height = '100%';
    wrap.style.padding = '0'; wrap.style.background = '#fff';
  } else if (device === 'tablet') {
    iframe.style.width = '768px'; iframe.style.height = '95%';
    wrap.style.padding = '14px'; wrap.style.background = '#0a0a0a';
  } else {
    iframe.style.width = '390px'; iframe.style.height = '95%';
    wrap.style.padding = '14px'; wrap.style.background = '#0a0a0a';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  CODE ACTIONS
// ─────────────────────────────────────────────────────────────────────────────
function clearCode() {
  const ed = state.editors[state.currentLang];
  ed.setValue('');
  showToast('Editor cleared');
}

function copyCode() {
  navigator.clipboard.writeText(state.code[state.currentLang]);
  showToast('Copied to clipboard', 'success');
}

function downloadCode() {
  const ext = { html: 'html', css: 'css', javascript: 'js', lua: 'lua' };
  const blob = new Blob([state.code[state.currentLang]], { type: 'text/plain' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `website.${ext[state.currentLang]}`; a.click();
  showToast('Downloaded', 'success');
}

// ─────────────────────────────────────────────────────────────────────────────
//  CHAT
// ─────────────────────────────────────────────────────────────────────────────
const chatEl = document.getElementById('chat-messages');
const inputEl = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

function showWelcome() {
  addMessage('ai', `**Welcome — I build websites & Lua tools.**

Powered by **Z.ai GLM**, I can:

• Build complete websites (HTML + CSS + JS)
• Use Roblox Lua obfuscation tools
• Add backend API calls & endpoints
• Import and modify Lua scripts

**Try:**
- *"Create a cyberpunk dashboard with charts"*
- *"Build a Lua obfuscator web UI"*
- *"Show me the available Lua files"*

What shall we build?`);
}

function addMessage(role, content, extracted = null) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  if (role === 'ai' && state.chatHistory.length === 0) div.classList.add('welcome-msg');
  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  let html = `<div class="msg-bubble">${role === 'ai' ? renderMarkdown(content) : escapeHtml(content)}</div>`;
  html += `<div class="msg-meta">${now}</div>`;
  div.innerHTML = html;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function applyExtracted(ex) {
  if (ex.html) { state.code.html = ex.html; state.editors.html.setValue(ex.html); }
  if (ex.css)  { state.code.css  = ex.css;  state.editors.css.setValue(ex.css); }
  if (ex.js)   { state.code.javascript = ex.js; state.editors.javascript.setValue(ex.js); }
  applyCode();
}

function loadExtractedLua(lua) {
  state.code.lua = lua;
  state.editors.lua.setValue(lua);
  switchTab('lua', document.querySelector('[data-lang="lua"]'));
  showToast('Lua code loaded', 'success');
}

function extractCode(text) {
  const result = { html: null, css: null, js: null, lua: null };
  const blockRe = /```(html|css|javascript|js|lua|javascript-backend)\s*\n([\s\S]*?)```/gi;
  let m;
  while ((m = blockRe.exec(text)) !== null) {
    const lang = m[1].toLowerCase();
    const code = m[2];
    if (lang === 'html') result.html = code;
    else if (lang === 'css') result.css = code;
    else if (lang === 'javascript' || lang === 'js') result.js = code;
    else if (lang === 'lua') result.lua = code;
  }
  return result;
}

function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${lang}">${code}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^[\-•] (.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hlu]|<pre|<li)(.+)$/gm, (match) => match.startsWith('<') ? match : `<p>${match}</p>`)
    .replace(/<li>.*<\/li>/gs, m => `<ul>${m}</ul>`);
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let typingEl = null;
function showTyping() {
  typingEl = document.createElement('div');
  typingEl.className = 'msg msg-ai';
  typingEl.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chatEl.appendChild(typingEl);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || state.isGenerating) return;

  inputEl.value = '';
  autoResizeInput();
  addMessage('user', text);
  state.chatHistory.push({ role: 'user', content: text });

  await generate();
}

async function generate() {
  state.isGenerating = true;
  sendBtn.disabled = true;
  showTyping();

  const model = document.getElementById('model-select').value || 'glm-4.7';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: state.chatHistory, model })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      hideTyping();
      addMessage('ai', `❌ Error: ${err.error || res.statusText}`);
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    hideTyping();
    const msgEl = document.createElement('div');
    msgEl.className = 'msg msg-ai';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    msgEl.appendChild(bubble);
    msgEl.appendChild(meta);
    chatEl.appendChild(msgEl);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta?.content || '';
          fullText += delta;
          bubble.innerHTML = renderMarkdown(fullText);
          chatEl.scrollTop = chatEl.scrollHeight;
        } catch {}
      }
    }

    const extracted = extractCode(fullText);
    const hasCode = extracted.html || extracted.css || extracted.js || extracted.lua;

    if (hasCode) {
      const bar = document.createElement('div');
      bar.className = 'code-apply-bar';
      if (extracted.html || extracted.css || extracted.js) {
        const btn = document.createElement('button');
        btn.className = 'code-apply-btn';
        btn.textContent = '⚡ Apply & Preview';
        btn.onclick = () => applyExtracted(extracted);
        bar.appendChild(btn);
      }
      if (extracted.lua) {
        const btn = document.createElement('button');
        btn.className = 'code-apply-btn';
        btn.textContent = '🔮 Load Lua';
        btn.onclick = () => loadExtractedLua(extracted.lua);
        bar.appendChild(btn);
      }
      msgEl.appendChild(bar);
    }

    state.chatHistory.push({ role: 'assistant', content: fullText });

    if (extracted.html && !state.previewLive) {
      applyExtracted(extracted);
    }

  } catch (err) {
    hideTyping();
    addMessage('ai', `❌ Network error: ${err.message}`);
  } finally {
    state.isGenerating = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  LUA FILE BROWSER
// ─────────────────────────────────────────────────────────────────────────────
let luaDrawerOpen = false;

async function loadLuaFiles() {
  try {
    const res = await fetch('/api/lua-files');
    const { files } = await res.json();
    const list = document.getElementById('lua-file-list');
    list.innerHTML = files.map(f => `
      <div class="lua-file-item" onclick="openLuaFile('${f.name}')">
        <span>📄</span>
        <span class="lua-file-name">${f.name}</span>
        <span class="lua-file-size">${formatBytes(f.size)}</span>
        <span class="lua-file-load">view</span>
      </div>`).join('');
  } catch {}
}

function toggleLuaDrawer() {
  luaDrawerOpen = !luaDrawerOpen;
  document.getElementById('lua-file-list').style.display = luaDrawerOpen ? 'block' : 'none';
  document.getElementById('lua-drawer-chevron').style.transform = luaDrawerOpen ? 'rotate(180deg)' : '';
}

async function openLuaFile(name) {
  try {
    const res = await fetch(`/api/lua-file?name=${encodeURIComponent(name)}`);
    if (!res.ok) { showToast('Could not load file', 'error'); return; }
    const { content, truncated } = await res.json();
    state.currentLuaFile = name;
    state.luaFileContent = content;

    document.getElementById('lua-modal-title').textContent = name + (truncated ? ' (truncated)' : '');
    document.getElementById('lua-modal-content').innerHTML = highlightLua(content);
    document.getElementById('lua-modal').classList.add('open');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

function closeLuaModal() {
  document.getElementById('lua-modal').classList.remove('open');
}

function loadLuaToEditor() {
  if (!state.luaFileContent) return;
  state.code.lua = state.luaFileContent;
  state.editors.lua.setValue(state.luaFileContent);
  switchTab('lua', document.querySelector('[data-lang="lua"]'));
  closeLuaModal();
  showToast(`${state.currentLuaFile} loaded`, 'success');
}

function askAIAboutLua() {
  if (!state.currentLuaFile) return;
  closeLuaModal();
  const snippet = (state.luaFileContent || '').slice(0, 2000);
  const msg = `Tell me about this Lua file: **${state.currentLuaFile}**\n\nHere's the beginning:\n\`\`\`lua\n${snippet}\n\`\`\`\n\nWhat does it do, how can I use it, and can you build a web UI to interact with it?`;
  inputEl.value = msg;
  sendMessage();
}

function highlightLua(code) {
  const kws = /\b(local|function|end|if|then|else|elseif|for|do|while|repeat|until|return|break|not|and|or|in|nil|true|false)\b/g;
  return escapeHtml(code)
    .replace(kws, '<span class="kw">$1</span>')
    .replace(/(--[^\n]*)/g, '<span class="cmt">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="str">$1</span>')
    .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="num">$1</span>');
}

// ─────────────────────────────────────────────────────────────────────────────
//  QUICK ACTIONS
// ─────────────────────────────────────────────────────────────────────────────
function quickMsg(msg) {
  inputEl.value = msg;
  sendMessage();
}

//  RESIZER
// ─────────────────────────────────────────────────────────────────────────────
function makeResizer(resizerId, panelAId, panelBId) {
  const resizer = document.getElementById(resizerId);
  const panelA = document.getElementById(panelAId);
  const panelB = document.getElementById(panelBId);
  let startX, startAW, startBW;

  resizer.addEventListener('mousedown', e => {
    startX = e.clientX;
    startAW = panelA.offsetWidth;
    startBW = panelB.offsetWidth;
    resizer.classList.add('active');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';

    const onMove = e => {
      const dx = e.clientX - startX;
      const newAW = Math.max(220, startAW + dx);
      const newBW = Math.max(220, startBW - dx);
      panelA.style.width = newAW + 'px';
      panelA.style.flex = 'none';
      panelB.style.width = newBW + 'px';
      panelB.style.flex = 'none';
    };
    const onUp = () => {
      resizer.classList.remove('active');
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
}

makeResizer('resizer-1', 'chat-panel', 'preview-panel');
makeResizer('resizer-2', 'preview-panel', 'code-panel');

// ─────────────────────────────────────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.className = '', 2500);
}

function formatBytes(b) {
  if (b < 1024) return b + 'B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + 'KB';
  return (b/1024/1024).toFixed(1) + 'MB';
}

function autoResizeInput() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

inputEl.addEventListener('input', autoResizeInput);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('lua-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('lua-modal')) closeLuaModal();
});

fetch('/api/health').then(r => r.json()).then(d => {
  const ind = document.getElementById('status-indicator');
  if (d.status === 'ok') {
    ind.style.background = 'var(--green)';
    ind.style.boxShadow = '0 0 8px var(--green)';
  }
}).catch(() => {
  const ind = document.getElementById('status-indicator');
  ind.style.background = 'var(--red)';
  ind.style.boxShadow = '0 0 8px var(--red)';
});
