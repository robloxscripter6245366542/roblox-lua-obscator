<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>@</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:#fff;min-height:100vh;font-family:ui-sans-serif,system-ui,sans-serif;overflow-x:hidden}
  #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ffffff22;border-radius:2px}

  /* ── draggable box ── */
  .drag-box{position:fixed;z-index:300;min-width:160px;min-height:80px;border-radius:16px;border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(24px);background:rgba(255,255,255,.04);overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
  .drag-head{cursor:grab;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.6);user-select:none}
  .drag-head:active{cursor:grabbing}
  .drag-body{padding:14px}
  .drag-resize{position:absolute;bottom:4px;right:4px;width:14px;height:14px;cursor:se-resize;opacity:.3}
  .drag-resize:hover{opacity:.8}
  .drag-close{cursor:pointer;opacity:.4;transition:.15s;background:none;border:none;color:#fff;font-size:14px;line-height:1}
  .drag-close:hover{opacity:1}

  /* ── mini player ── */
  .mini-player-icon{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9999px;background:#ffffff1f;border:1px solid rgba(255,255,255,.22);flex-shrink:0;cursor:pointer;transition:.15s}
  .mini-player-icon:hover{background:#ffffff33}
  .mini-player-bars{display:flex;align-items:flex-end;gap:2px;height:14px;flex-shrink:0}
  .mini-player-bar{width:3px;border-radius:2px;background:#fff;animation:bar-bounce 1s ease-in-out infinite}
  .mini-player-bar:nth-child(2){animation-delay:.15s}
  .mini-player-bar:nth-child(3){animation-delay:.3s}
  .mini-player-bar:nth-child(4){animation-delay:.1s}
  @keyframes bar-bounce{0%,100%{height:4px}50%{height:14px}}
  .mini-player-bars.paused .mini-player-bar{animation:none;height:4px}
  .mini-player-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.88)}
  .mini-player-title{font-size:12px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
  .mini-player-time{font-size:10px;color:rgba(255,255,255,.5)}
  .player-range{-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.15);border-radius:4px;height:3px;outline:none;cursor:pointer}
  .player-range::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
  .ctrl-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:9999px;color:#fff;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;transition:.15s;flex-shrink:0}
  .ctrl-btn:hover{background:rgba(255,255,255,.25)}

  /* ── color picker ── */
  input[type=color]{-webkit-appearance:none;appearance:none;width:24px;height:24px;border:none;border-radius:6px;cursor:pointer;padding:0;background:none}
  input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  input[type=color]::-webkit-color-swatch{border:none;border-radius:6px}

  /* ── chat ── */
  #chat-wrap{scrollbar-width:thin;scrollbar-color:#ffffff22 transparent}
  .msg-user{background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.25);border-radius:12px 12px 4px 12px;padding:10px 14px;font-size:13.5px;line-height:1.55;max-width:85%;align-self:flex-end}
  .msg-ai{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px 12px 12px 4px;padding:10px 14px;font-size:13.5px;line-height:1.55;max-width:95%}
  .msg-ai pre{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;overflow-x:auto;font-size:12px;font-family:ui-monospace,monospace;margin:6px 0}
  .msg-ai code:not(pre code){background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-family:ui-monospace,monospace;font-size:12px}
  .msg-ai strong{color:#58a6ff}
  .typing-dot{width:6px;height:6px;border-radius:50%;background:#58a6ff;animation:tdot 1.2s infinite}
  .typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes tdot{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
  .apply-btn{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.4);color:#58a6ff;cursor:pointer;font-weight:600;transition:.15s;white-space:nowrap}
  .apply-btn:hover{background:#58a6ff;color:#000}

  /* ── code editor ── */
  .code-tab{padding:8px 16px;font-size:12px;cursor:pointer;color:rgba(255,255,255,.4);border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .code-tab.active{color:#fff;border-bottom-color:#58a6ff}
  .code-tab:hover:not(.active){color:rgba(255,255,255,.7)}

  /* ── preview toolbar ── */
  .tl{width:11px;height:11px;border-radius:50%}

  /* ── panel resize ── */
  .resizer{background:rgba(255,255,255,.06);cursor:col-resize;transition:.15s;flex-shrink:0}
  .resizer:hover,.resizer.active{background:#58a6ff}

  /* ── scrollbar in code area ── */
  #code-area{scrollbar-width:thin;scrollbar-color:#ffffff18 transparent}
  #chat-messages-inner{display:flex;flex-direction:column;gap:8px}

  /* ── quick btns ── */
  .quick-btn{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);cursor:pointer;transition:.15s;white-space:nowrap;flex-shrink:0}
  .quick-btn:hover{border-color:#58a6ff;color:#58a6ff}

  /* ── lua file ── */
  .lua-item{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;transition:.1s}
  .lua-item:hover{background:rgba(255,255,255,.06)}

  /* ── toast ── */
  #toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:rgba(22,27,34,.95);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 16px;font-size:13px;transform:translateY(60px);opacity:0;transition:.25s;pointer-events:none;backdrop-filter:blur(20px)}
  #toast.show{transform:translateY(0);opacity:1}

  /* ── modal ── */
  #lua-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  #lua-modal.open{display:flex}
</style>
</head>
<body>

<!-- WebGL animated background -->
<canvas id="bg-canvas"></canvas>

<!-- ══ TOP BAR ══ -->
<div class="fixed top-0 left-0 right-0 z-50 h-11 flex items-center px-4 gap-3 border-b border-white/[0.06]" style="background:rgba(0,0,0,.7);backdrop-filter:blur(20px)">
  <div class="flex items-center gap-2 font-semibold text-sm select-none">
    <div class="w-6 h-6 rounded-md flex items-center justify-center text-xs" style="background:linear-gradient(135deg,#58a6ff,#bc8cff)">⚡</div>
    <span>AI Builder</span>
  </div>
  <div class="w-px h-5 bg-white/10"></div>
  <select id="model-sel" class="text-xs bg-white/5 border border-white/10 rounded-md px-2 py-1 text-white/60 outline-none cursor-pointer">
    <option value="glm-4.7">glm-4.7</option>
    <option value="glm-4-plus">glm-4-plus</option>
    <option value="glm-4-flash">glm-4-flash</option>
  </select>
  <div class="ml-auto flex items-center gap-2">
    <span class="text-xs px-2 py-0.5 rounded-full border font-semibold" style="background:#1a2a3a;color:#58a6ff;border-color:#1f3a5f">Roblox Lua</span>
    <span class="text-xs px-2 py-0.5 rounded-full border font-semibold" style="background:#1a3a2a;color:#3fb950;border-color:#2a5a3a">Z.ai</span>
    <div id="status-dot" class="w-2 h-2 rounded-full" style="background:#3fb950;box-shadow:0 0 6px #3fb950"></div>
    <!-- bg color toggle -->
    <div class="flex items-center gap-1 ml-2">
      <span class="text-xs text-white/30">BG</span>
      <input type="color" id="bg-color" value="#000000" title="Background color" class="w-6 h-6 cursor-pointer rounded"/>
      <button onclick="resetBg()" class="text-xs text-white/30 hover:text-white/70 transition px-1" title="Reset">↺</button>
    </div>
    <button onclick="addBox()" class="quick-btn ml-1">＋ Box</button>
  </div>
</div>

<!-- ══ MAIN 3-PANEL ══ -->
<div id="main" class="flex pt-11" style="height:100vh">

  <!-- ═ CHAT PANEL ═ -->
  <div id="chat-panel" class="flex flex-col border-r border-white/[0.06]" style="width:340px;min-width:200px">
    <!-- header -->
    <div class="h-9 flex items-center px-4 gap-2 border-b border-white/[0.06] flex-shrink-0" style="background:rgba(255,255,255,.02)">
      <svg class="opacity-50" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="text-xs font-semibold uppercase tracking-wider text-white/40">AI Chat</span>
    </div>
    <!-- messages -->
    <div id="chat-wrap" class="flex-1 overflow-y-auto p-3">
      <div id="chat-messages-inner"></div>
    </div>
    <!-- lua drawer -->
    <div id="lua-drawer" class="border-t border-white/[0.06] flex-shrink-0" style="background:rgba(255,255,255,.01)">
      <div onclick="toggleLua()" class="flex items-center gap-2 px-3 py-2 cursor-pointer text-xs font-semibold uppercase tracking-wider text-white/40 hover:text-white/70 transition select-none">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Lua Files
        <svg id="lua-chevron" class="ml-auto transition-transform duration-200" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div id="lua-list" class="hidden overflow-y-auto pb-2" style="max-height:150px;scrollbar-width:thin;scrollbar-color:#ffffff18 transparent"></div>
    </div>
    <!-- input -->
    <div class="flex-shrink-0 p-2.5 border-t border-white/[0.06]" style="background:rgba(0,0,0,.3)">
      <div class="flex gap-1.5 mb-2 flex-wrap">
        <button class="quick-btn" onclick="q('Build a dark landing page with animated WebGL background, draggable boxes, and a music player')">Full Site</button>
        <button class="quick-btn" onclick="q('Add a draggable resizable glass box with a color picker')">＋ Box</button>
        <button class="quick-btn" onclick="q('Add a background music player widget with play/pause, track name, volume slider, and animated bars')">🎵 Music</button>
        <button class="quick-btn" onclick="q('Add a background color picker with presets and gradient mode')">🎨 BG</button>
        <button class="quick-btn" onclick="q('Build a Roblox Lua obfuscator web UI with a code input, obfuscate button, and output display')">Obfuscator</button>
      </div>
      <div class="flex gap-2 items-end rounded-xl border border-white/10 px-3 py-2 focus-within:border-blue-500/50 transition" style="background:rgba(255,255,255,.04)">
        <textarea id="chat-in" rows="1" placeholder="Tell the AI what to build…" class="flex-1 bg-transparent border-none outline-none text-sm text-white placeholder-white/30 resize-none" style="max-height:100px;line-height:1.5"></textarea>
        <button id="send-btn" onclick="sendMsg()" class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 transition" style="background:#58a6ff;color:#000">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="resizer w-1" id="r1"></div>

  <!-- ═ PREVIEW PANEL ═ -->
  <div id="preview-panel" class="flex flex-col flex-1" style="min-width:200px">
    <!-- preview toolbar -->
    <div class="h-9 flex items-center gap-2 px-3 border-b border-white/[0.06] flex-shrink-0" style="background:rgba(255,255,255,.02)">
      <div class="flex gap-1.5">
        <div class="tl" style="background:#ff5f57"></div>
        <div class="tl" style="background:#ffbd2e"></div>
        <div class="tl" style="background:#28c940"></div>
      </div>
      <input id="preview-url" readonly value="about:blank" class="flex-1 text-xs bg-white/5 border border-white/10 rounded-md px-2 py-1 text-white/40 font-mono outline-none"/>
      <button onclick="applyCode()" class="text-sm text-white/40 hover:text-white/80 transition px-1" title="Refresh">↺</button>
      <div class="flex gap-1">
        <button class="quick-btn active" onclick="device('desktop',this)">🖥</button>
        <button class="quick-btn" onclick="device('tablet',this)">📱</button>
        <button class="quick-btn" onclick="device('mobile',this)">📲</button>
      </div>
    </div>
    <div id="preview-wrap" class="flex-1 relative overflow-hidden" style="background:#fff">
      <div id="preview-empty" class="absolute inset-0 flex flex-col items-center justify-center gap-3 text-white/20" style="background:#000">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span class="text-sm">Ask the AI to build something</span>
      </div>
      <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals" class="w-full h-full border-none hidden"></iframe>
    </div>
  </div>

  <div class="resizer w-1" id="r2"></div>

  <!-- ═ CODE PANEL ═ -->
  <div id="code-panel" class="flex flex-col border-l border-white/[0.06]" style="width:420px;min-width:200px">
    <!-- tabs -->
    <div class="flex border-b border-white/[0.06] flex-shrink-0 overflow-x-auto" style="background:rgba(255,255,255,.02)">
      <div class="code-tab active" data-lang="html" onclick="switchTab('html',this)"><span style="background:#f0883e;width:6px;height:6px;border-radius:50%;display:inline-block"></span>index.html</div>
      <div class="code-tab" data-lang="css" onclick="switchTab('css',this)"><span style="background:#58a6ff;width:6px;height:6px;border-radius:50%;display:inline-block"></span>style.css</div>
      <div class="code-tab" data-lang="js" onclick="switchTab('js',this)"><span style="background:#d29922;width:6px;height:6px;border-radius:50%;display:inline-block"></span>app.js</div>
      <div class="code-tab" data-lang="lua" onclick="switchTab('lua',this)"><span style="background:#bc8cff;width:6px;height:6px;border-radius:50%;display:inline-block"></span>script.lua</div>
    </div>
    <!-- editor area -->
    <div id="code-area" class="flex-1 overflow-auto" style="background:#0d1117;scrollbar-width:thin;scrollbar-color:#ffffff18 transparent">
      <textarea id="code-editor" spellcheck="false" class="w-full h-full bg-transparent border-none outline-none p-4 text-xs font-mono text-green-400/90 resize-none leading-relaxed" style="tab-size:2;min-height:100%;caret-color:#58a6ff"></textarea>
    </div>
    <!-- actions -->
    <div class="flex gap-2 items-center p-2.5 border-t border-white/[0.06] flex-shrink-0" style="background:rgba(255,255,255,.02)">
      <button onclick="applyCode()" class="flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-lg transition" style="background:#58a6ff;color:#000">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Apply
      </button>
      <button onclick="copyCode()" class="quick-btn">Copy</button>
      <button onclick="dlCode()" class="quick-btn">Download</button>
      <span id="code-stat" class="text-xs text-white/25 ml-auto font-mono">0 lines</span>
    </div>
  </div>
</div>

<!-- ══ MUSIC PLAYER (fixed bottom-left) ══ -->
<div id="music-player" class="fixed bottom-4 left-4 z-50 rounded-2xl border border-white/10 p-3 flex flex-col gap-2.5" style="width:260px;background:rgba(255,255,255,.04);backdrop-filter:blur(24px);display:none!important">
  <div class="flex items-center gap-2.5">
    <div class="mini-player-icon" id="play-btn" onclick="togglePlay()">▶</div>
    <div class="flex flex-col gap-0.5 min-w-0 flex-1">
      <span class="mini-player-label">Now Playing</span>
      <span class="mini-player-title" id="track-name">—</span>
    </div>
    <div class="mini-player-bars" id="vis-bars">
      <div class="mini-player-bar"></div>
      <div class="mini-player-bar"></div>
      <div class="mini-player-bar"></div>
      <div class="mini-player-bar"></div>
    </div>
  </div>
  <div class="flex flex-col gap-1">
    <input type="range" id="seek-bar" class="player-range w-full" min="0" max="100" value="0"/>
    <div class="flex justify-between">
      <span class="mini-player-time" id="cur-time">0:00</span>
      <span class="mini-player-time" id="dur-time">0:00</span>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <span class="text-xs text-white/40">Vol</span>
    <input type="range" id="vol-bar" class="player-range flex-1" min="0" max="1" step="0.01" value="0.5"/>
    <button onclick="prevTrack()" class="ctrl-btn">‹</button>
    <button onclick="nextTrack()" class="ctrl-btn">›</button>
    <button onclick="document.getElementById('music-player').style.display='none'" class="ctrl-btn opacity-40 hover:opacity-100">✕</button>
  </div>
</div>

<!-- ══ ADD MUSIC BUTTON ══ -->
<button id="music-toggle" onclick="openMusic()" class="fixed bottom-4 left-4 z-50 flex items-center gap-2 text-xs px-3 py-2 rounded-xl border border-white/10 transition" style="background:rgba(255,255,255,.04);backdrop-filter:blur(20px);color:rgba(255,255,255,.6)">
  🎵 Music
</button>

<!-- ══ LUA MODAL ══ -->
<div id="lua-modal">
  <div class="rounded-2xl border border-white/10 flex flex-col overflow-hidden" style="width:700px;max-width:95vw;max-height:80vh;background:rgba(13,17,23,.97);backdrop-filter:blur(30px)">
    <div class="flex items-center gap-3 px-4 py-3 border-b border-white/[0.06]">
      <span class="text-sm font-semibold" id="lua-modal-title">file.lua</span>
      <button onclick="closeLuaModal()" class="ml-auto text-white/40 hover:text-white transition text-lg leading-none bg-transparent border-none cursor-pointer">×</button>
    </div>
    <pre id="lua-modal-content" class="flex-1 overflow-auto p-4 text-xs font-mono text-green-400/80 leading-relaxed" style="scrollbar-width:thin;scrollbar-color:#ffffff18 transparent;white-space:pre;tab-size:2"></pre>
    <div class="flex gap-2 p-3 border-t border-white/[0.06]">
      <button onclick="loadLuaToEditor()" class="text-xs font-semibold px-3 py-1.5 rounded-lg transition" style="background:#58a6ff;color:#000">Load into Editor</button>
      <button onclick="askAboutLua()" class="quick-btn">Ask AI About This</button>
      <button onclick="closeLuaModal()" class="quick-btn">Close</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<!-- ══ AUDIO ══ -->
<audio id="audio" loop></audio>

<script>
// ─────────────────────────────── WEBGL BACKGROUND ────────────────────────────
(function(){
  const canvas=document.getElementById('bg-canvas');
  const gl=canvas.getContext('webgl');
  if(!gl)return;
  const vs=`attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
  const fs=`precision mediump float;
uniform float time;uniform vec2 res;uniform vec3 uCol;
float rnd(vec2 p){p=fract(p*vec2(12.9898,78.233));p+=dot(p,p+34.56);return fract(p.x*p.y);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
  return mix(mix(rnd(i),rnd(i+vec2(1,0)),u.x),mix(rnd(i+vec2(0,1)),rnd(i+1.),u.x),u.y);}
float fbm(vec2 p){float t=0.,a=.5;for(int i=0;i<5;i++){t+=a*noise(p);p*=2.1;a*=.5;}return t;}
void main(){
  vec2 uv=(gl_FragCoord.xy-.5*res)/min(res.x,res.y);
  float f=fbm(uv*2.+vec2(time*.07,time*.05));
  f=fbm(uv*3.+f+vec2(time*.04,-time*.06));
  vec3 col=mix(vec3(0.),uCol,clamp(f*1.4-.3,0.,1.));
  col*=min(time*.4,1.);
  gl_FragColor=vec4(col,1.);
}`;
  function shader(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
  const prog=gl.createProgram();
  gl.attachShader(prog,shader(gl.VERTEX_SHADER,vs));
  gl.attachShader(prog,shader(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(prog);gl.useProgram(prog);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  const uTime=gl.getUniformLocation(prog,'time');
  const uRes=gl.getUniformLocation(prog,'res');
  const uCol=gl.getUniformLocation(prog,'uCol');
  window._setShaderColor=function(hex){
    const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
    gl.uniform3f(uCol,r,g,b);
  };
  window._setShaderColor('#0a1a2e');
  function resize(){canvas.width=innerWidth;canvas.height=innerHeight;gl.viewport(0,0,canvas.width,canvas.height);gl.uniform2f(uRes,canvas.width,canvas.height);}
  window.addEventListener('resize',resize);resize();
  let t=0;(function loop(){t+=.016;gl.uniform1f(uTime,t);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(loop);})();
})();

function fmt(s){if(!isFinite(s))return'0:00';return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}
function loadTrack(i){
  const t=TRACKS[i];trackName.textContent=t.n;

  else{audio.pause();playBtn.textContent='▶';visBars.classList.add('paused');}
}
function prevTrack(){trackIdx=(trackIdx-1+TRACKS.length)%TRACKS.length;loadTrack(trackIdx);}
function nextTrack(){trackIdx=(trackIdx+1)%TRACKS.length;loadTrack(trackIdx);}
audio.addEventListener('timeupdate',()=>{if(!isFinite(audio.duration))return;seekBar.value=audio.currentTime/audio.duration*100;curTime.textContent=fmt(audio.currentTime);durTime.textContent=fmt(audio.duration);});
seekBar.addEventListener('input',()=>{if(isFinite(audio.duration))audio.currentTime=seekBar.value/100*audio.duration;});

let boxN=0;
function addBox(title,content,color){
  boxN++;
  const box=document.createElement('div');
  box.className='drag-box';
  const bg=color||'rgba(255,255,255,.04)';
  box.style.cssText=`left:${80+boxN*30}px;top:${120+boxN*30}px;width:220px;${color?'background:'+color:''};border:1px solid rgba(255,255,255,.12)`;
  box.innerHTML=`
    <div class="drag-head">
      <span>${title||'Box '+boxN}</span>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="color" value="#8844ff" title="Box color" style="width:18px;height:18px;border-radius:4px;cursor:pointer;border:none;padding:0;background:none"/>
        <button class="drag-close" onclick="this.closest('.drag-box').remove()">✕</button>
      </div>
    </div>
    <div class="drag-body" style="font-size:12px;color:rgba(255,255,255,.6)">${content||'Drag me around!'}</div>
    <svg class="drag-resize" viewBox="0 0 10 10" fill="rgba(255,255,255,.5)"><path d="M9 1L1 9M5 1L1 5M9 5L5 9"/></svg>
  `;
  const colorIn=box.querySelector('input[type=color]');
  colorIn.addEventListener('input',e=>{box.style.background=e.target.value;box.style.backdropFilter='blur(24px)';});
  // drag
  box.querySelector('.drag-head').addEventListener('pointerdown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON'||e.target.closest('button'))return;
    const ox=e.clientX-box.offsetLeft,oy=e.clientY-box.offsetTop;
    const move=e=>{box.style.left=(e.clientX-ox)+'px';box.style.top=(e.clientY-oy)+'px';};
    const up=()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up);};
    addEventListener('pointermove',move);addEventListener('pointerup',up);e.preventDefault();
  });
  // resize
  box.querySelector('.drag-resize').addEventListener('pointerdown',e=>{
    const sx=e.clientX,sy=e.clientY,sw=box.offsetWidth,sh=box.offsetHeight;
    const move=e=>{box.style.width=Math.max(160,sw+e.clientX-sx)+'px';box.style.height=Math.max(80,sh+e.clientY-sy)+'px';};
    const up=()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up);};
    addEventListener('pointermove',move);addEventListener('pointerup',up);e.preventDefault();
  });
  document.body.appendChild(box);
}

// ─────────────────────────────── CHAT ────────────────────────────────────────
const chatIn=document.getElementById('chat-in');
const sendBtn=document.getElementById('send-btn');
const msgWrap=document.getElementById('chat-messages-inner');
const chatWrap=document.getElementById('chat-wrap');

function md(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c}</code></pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/^[\-•] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,m=>`<ul style="padding-left:16px;margin:4px 0">${m}</ul>`)
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

function addMsg(role,text,extra){
  const d=document.createElement('div');
  d.style.cssText='display:flex;flex-direction:column;gap:3px;align-items:'+(role==='user'?'flex-end':'flex-start');
  const bubble=document.createElement('div');
  bubble.className=role==='user'?'msg-user':'msg-ai';
  bubble.innerHTML=role==='ai'?md(text):text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  d.appendChild(bubble);
  if(extra){d.appendChild(extra);}
  msgWrap.appendChild(d);
  chatWrap.scrollTop=chatWrap.scrollHeight;
  return {el:d,bubble};
}

function extractCode(text){
  const r={html:null,css:null,js:null,lua:null};
  const re=/```(html|css|javascript|js|lua)\s*\n([\s\S]*?)```/gi;
  let m;while((m=re.exec(text))!==null){
    const l=m[1].toLowerCase(),c=m[2];
    if(l==='html')r.html=c;
    else if(l==='css')r.css=c;
    else if(l==='javascript'||l==='js')r.js=c;
    else if(l==='lua')r.lua=c;
  }
  return r;
}

function applyExtracted(ex){
  if(ex.html)setCode('html',ex.html);
  if(ex.css)setCode('css',ex.css);
  if(ex.js)setCode('js',ex.js);
  applyCode();
}

function mkApplyBar(ex){
  const bar=document.createElement('div');
  bar.style.cssText='display:flex;gap:6px;margin-top:6px;flex-wrap:wrap';
  if(ex.html||ex.css||ex.js){
    const b=document.createElement('button');b.className='apply-btn';b.textContent='⚡ Apply to Preview';
    b.onclick=()=>applyExtracted(ex);bar.appendChild(b);
  }
  if(ex.lua){
    const b=document.createElement('button');b.className='apply-btn';b.textContent='🔮 Load Lua';
    b.onclick=()=>{setCode('lua',ex.lua);switchTab('lua',document.querySelector('[data-lang="lua"]'));toast('Lua loaded!');};
    bar.appendChild(b);
  }
  return bar;
}

let typing=null;
function showTyping(){
  typing=document.createElement('div');
  typing.style.cssText='display:flex;gap:4px;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px 12px 12px 4px;width:fit-content';
  typing.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  msgWrap.appendChild(typing);chatWrap.scrollTop=chatWrap.scrollHeight;
}
function hideTyping(){if(typing){typing.remove();typing=null;}}

async function sendMsg(){
  const text=chatIn.value.trim();
  if(!text||state.generating)return;
  chatIn.value='';chatIn.style.height='auto';
  addMsg('user',text);
  state.history.push({role:'user',content:text});
  await generate();
}

async function generate(){
  state.generating=true;sendBtn.disabled=true;showTyping();
  const model=document.getElementById('model-sel').value;
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:state.history,model})});
    if(!res.ok){const e=await res.json().catch(()=>({error:res.statusText}));hideTyping();addMsg('ai','❌ Error: '+(e.error||res.statusText));return;}
    const reader=res.body.getReader();const dec=new TextDecoder();
    let full='',buf='';
    hideTyping();
    const {el,bubble}=addMsg('ai','');
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const d=line.slice(6).trim();if(d==='[DONE]')break;
        try{const p=JSON.parse(d);const delta=p.choices?.[0]?.delta?.content||'';full+=delta;bubble.innerHTML=md(full);chatWrap.scrollTop=chatWrap.scrollHeight;}catch{}
      }
    }
    const ex=extractCode(full);
    if(ex.html||ex.css||ex.js||ex.lua){el.appendChild(mkApplyBar(ex));}
    if(ex.html&&!state.previewLive)applyExtracted(ex);
    state.history.push({role:'assistant',content:full});
  }catch(err){hideTyping();addMsg('ai','❌ '+err.message);}
  finally{state.generating=false;sendBtn.disabled=false;chatIn.focus();}
}

function q(msg){chatIn.value=msg;sendMsg();}

chatIn.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
chatIn.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});

async function loadLuaFiles(){
  try{
    const r=await fetch('/api/lua-files');const{files}=await r.json();
    const list=document.getElementById('lua-list');
    list.innerHTML=files.map(f=>`<div class="lua-item" onclick="openLua('${f.name}')">
      <span style="opacity:.4;font-size:11px">📄</span>
      <span style="flex:1;color:rgba(255,255,255,.7);font-family:ui-monospace,monospace;font-size:11px">${f.name}</span>
      <span style="font-size:10px;color:rgba(255,255,255,.3)">${fmtBytes(f.size)}</span>
    </div>`).join('');
  }catch{}
}
function fmtBytes(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';}

function mkResizer(id,aId,bId){
  const r=document.getElementById(id),a=document.getElementById(aId),b=document.getElementById(bId);
  r.addEventListener('mousedown',e=>{
    const sx=e.clientX,saw=a.offsetWidth,sbw=b.offsetWidth;
    r.classList.add('active');document.body.style.userSelect='none';document.body.style.cursor='col-resize';
    const mv=e=>{const dx=e.clientX-sx;a.style.width=Math.max(180,saw+dx)+'px';a.style.flex='none';b.style.width=Math.max(180,sbw-dx)+'px';b.style.flex='none';};
    const up=()=>{r.classList.remove('active');document.body.style.userSelect='';document.body.style.cursor='';removeEventListener('mousemove',mv);removeEventListener('mouseup',up);};
    addEventListener('mousemove',mv);addEventListener('mouseup',up);e.preventDefault();
  });
}

}
