<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID::VM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
:root{--bg:#05060a;--surface:#0b0d14;--panel:#0f1119;--border:#1a1f2e;--cyan:#00f5ff;--pink:#ff2d78;--green:#00ff88;--amber:#ffb347;--violet:#a06bff;--dim:#3a4060;--text:#c8d0e8;--muted:#555e80;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,0.012) 2px,rgba(0,245,255,0.012) 4px);pointer-events:none;z-index:9999;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
header{position:relative;z-index:10;padding:16px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:rgba(11,13,20,0.97);backdrop-filter:blur(10px);}
.logo-icon{width:33px;height:33px;border:1.5px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--cyan);box-shadow:0 0 14px rgba(0,245,255,0.25),inset 0 0 8px rgba(0,245,255,0.06);}
.logo-text{font-size:17px;font-weight:700;letter-spacing:5px;color:#fff;text-transform:uppercase;}
.logo-text span{color:var(--cyan);}
.header-badges{display:flex;gap:7px;margin-left:auto;}
.badge{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;border:1px solid var(--border);padding:3px 8px;}
.badge.live{color:var(--green);border-color:rgba(0,255,136,0.3);}
.badge.vm{color:var(--violet);border-color:rgba(160,107,255,0.3);}
.progress-bar{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--cyan),var(--violet),var(--pink));z-index:99999;box-shadow:0 0 8px var(--cyan);transition:width 0.07s linear;}
main{position:relative;z-index:10;display:flex;flex-direction:column;height:calc(100vh - 69px);}
.toolbar{padding:9px 18px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
.toolbar-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;white-space:nowrap;}
.toggle-group{display:flex;gap:2px;flex-wrap:wrap;}
.toggle{padding:4px 10px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.14s;user-select:none;white-space:nowrap;}
.toggle.on{background:rgba(0,245,255,0.08);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 8px rgba(0,245,255,0.12);}
.toggle.vm.on{background:rgba(160,107,255,0.1);border-color:var(--violet);color:var(--violet);box-shadow:0 0 10px rgba(160,107,255,0.18);}
.toggle:hover:not(.on){border-color:var(--dim);color:var(--text);}
.sep{width:1px;height:20px;background:var(--border);margin:0 3px;flex-shrink:0;}
.btn-run{padding:7px 24px;background:linear-gradient(135deg,rgba(0,245,255,0.12),rgba(0,245,255,0.04));border:1px solid var(--cyan);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;cursor:pointer;transition:all 0.18s;box-shadow:0 0 14px rgba(0,245,255,0.1);position:relative;overflow:hidden;white-space:nowrap;}
.btn-run::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.15),transparent);transition:left 0.4s;}
.btn-run:hover::before{left:100%;}
.btn-run:hover{box-shadow:0 0 28px rgba(0,245,255,0.28);}
.btn-run:active{transform:scale(0.97);}
.editors{display:flex;flex:1;overflow:hidden;}
.pane{display:flex;flex-direction:column;flex:1;border-right:1px solid var(--border);overflow:hidden;min-width:0;}
.pane:last-child{border-right:none;}
.pane-header{padding:8px 15px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-shrink:0;}
.pane-dot{width:6px;height:6px;border-radius:50%;}
.dot-cyan{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}
.dot-pink{background:var(--pink);box-shadow:0 0 6px var(--pink);}
.pane-title{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);}
.pane-meta{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);}
.btn-copy-big{padding:5px 16px;background:linear-gradient(135deg,rgba(255,45,120,0.14),rgba(255,45,120,0.04));border:1px solid var(--pink);color:var(--pink);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all 0.16s;box-shadow:0 0 10px rgba(255,45,120,0.1);white-space:nowrap;}
.btn-copy-big:hover{box-shadow:0 0 22px rgba(255,45,120,0.35);background:rgba(255,45,120,0.16);}
.btn-copy-big:active{transform:scale(0.96);}
textarea,.output-box{flex:1;background:var(--bg);color:var(--text);border:none;outline:none;padding:15px;font-family:'Share Tech Mono',monospace;font-size:12px;line-height:1.75;resize:none;width:100%;overflow-y:auto;tab-size:2;}
textarea::placeholder{color:var(--dim);}
.output-box{white-space:pre-wrap;word-break:break-all;color:#7fffb0;}
.output-box.empty{color:var(--dim);}
.output-box.error{color:var(--pink);}
.statusbar{padding:6px 18px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:14px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 5px var(--cyan);animation:pulse 2s infinite;}
.processing .status-dot{background:var(--violet);box-shadow:0 0 5px var(--violet);animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}
#statusDetail{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.toast{position:fixed;bottom:42px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(5,6,10,0.94);border:1px solid var(--cyan);color:var(--cyan);padding:8px 20px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;opacity:0;transition:all 0.22s;pointer-events:none;z-index:99998;backdrop-filter:blur(12px);}
.toast.pink{border-color:var(--pink);color:var(--pink);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:660px){.editors{flex-direction:column;}.pane{min-height:210px;}.btn-run{margin-left:0;}}
</style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<header>
  <div class="logo-icon">V</div>
  <div class="logo-text">VOID<span>::</span>VM</div>
  <div class="header-badges">
    <div class="badge vm">DEEP VM · NO SOURCE</div>
    <div class="badge">LUAU</div>
    <div class="badge live">● ONLINE</div>
    <div class="badge">v9.0</div>
  </div>
</header>
<main>
  <div class="toolbar">
    <span class="toolbar-label">LAYERS//</span>
    <div class="toggle-group">
      <button class="toggle on" id="t-strenc">STRING VAULT</button>
      <button class="toggle on" id="t-numenc">NUM ENCODE</button>
      <button class="toggle on" id="t-rename">SCOPE RENAME</button>
      <button class="toggle" id="t-cff">⟳ FLOW FLATTEN</button>
      <button class="toggle" id="t-junk">☠ JUNK CODE</button>
      <button class="toggle" id="t-wrap">BOOTSTRAP</button>
      <button class="toggle" id="t-minify">MINIFY</button>
      <button class="toggle vm on" id="t-vm">▣ VM VIRTUALIZE</button>
      <button class="toggle vm" id="t-vm2">VM ×2</button>
      <button class="toggle vm on" id="t-flatvm">⚡ FLAT BYTECODE</button>
      <button class="toggle vm" id="t-deepvm">⛓ DEEP VM (NO SOURCE)</button>
      <button class="toggle vm" id="t-split">🌐 SPLIT LOADER</button>
    </div>
    <div class="sep"></div>
    <button class="btn-run" onclick="runObfuscate()">▶ COMPILE</button>
  </div>
  <div class="editors">
    <div class="pane">
      <div class="pane-header">
        <div class="pane-dot dot-cyan"></div>
        <span class="pane-title">SOURCE INPUT</span>
        <span class="pane-meta" id="lineCount">0 LINES</span>
      </div>
      <textarea id="input" spellcheck="false" placeholder="-- Paste your Lua / Luau script here.
-- Parsed into a real AST, then compiled into encrypted VM bytecode.
-- 100% client-side. Your code never leaves this browser.

local config = { maxWave = 50, baseHealth = 200 }
local function describe(name, lvl)
  if lvl > 10 then
    return name .. ' is strong at ' .. lvl
  else
    return name .. ' is weak at ' .. lvl
  end
end
print(describe('Goblin', 5))
print('Max wave: ' .. config.maxWave)"></textarea>
    </div>
    <div class="pane">
      <div class="pane-header">
        <div class="pane-dot dot-pink"></div>
        <span class="pane-title">VIRTUALIZED OUTPUT</span>
        <span class="pane-meta" id="outStats">—</span>
        <button class="btn-copy-big" onclick="copyOutput()">⧉ COPY OUTPUT</button>
      </div>
      <div class="output-box empty" id="output">-- Virtualized output appears here...</div>
    </div>
  </div>
  <div class="statusbar" id="statusbar">
    <div class="status-dot"></div>
    <span id="statusText">LOADING PARSER...</span>
    <span id="statusDetail">— fetching luaparse · AST → custom bytecode · polymorphic VM · client-side</span>
  </div>
</main>
<div class="toast" id="toast"></div>

      try{ const raw=node.raw; val=raw[0]==='"'?JSON.parse(raw):JSON.parse('"'+raw.slice(1,-1).replace(/\\'/g,"'").replace(/"/g,'\\"')+'"'); }catch(e){ val=node.value||''; }
      node.__si=realStrings.length; realStrings.push(String(val==null?'':val)); return;
    }
    for(const k in node){ const v=node[k]; if(v&&typeof v==='object') collect(v); }
  }
  collect(ast);
  const entries=realStrings.map((s,i)=>({s,realIdx:i}));
  const decoyCount=Math.max(3,Math.floor(realStrings.length*0.7));
  for(let i=0;i<decoyCount;i++){ const len=rand(3,14); let s=''; for(let j=0;j<len;j++) s+=String.fromCharCode(rand(33,126)); entries.push({s,realIdx:null}); }
  shuffle(entries);
  const posOf={}; entries.forEach((e,pos)=>{ if(e.realIdx!==null) posOf[e.realIdx]=pos+1; });
  // UTF-8 safe byte encoding
  const enc=new TextEncoder();
  const strings=entries.map(e=>Array.from(enc.encode(e.s)).map(c=>(c^key)&0xFF));
  function replace(node){
    if(!node||typeof node!=='object') return;
    if(Array.isArray(node)){ node.forEach(replace); return; }
    if(node.type==='StringLiteral'&&node.__si!==undefined){
      const pos=posOf[node.__si];
      Object.keys(node).forEach(k=>delete node[k]);
      Object.assign(node,{type:'CallExpression',base:{type:'Identifier',name:decFn,isLocal:true},arguments:[{type:'NumericLiteral',value:pos,raw:String(pos)}]});
      return;
    }
    for(const k in node){ const v=node[k]; if(v&&typeof v==='object') replace(v); }
  }
  replace(ast);
  return { strings, key };
}

// ───────────────────────────────────────────────────────────────────
//  LAYER 3 — numeric encoding (additive split + bit32.bxor mix)
// ───────────────────────────────────────────────────────────────────
function bit32xorNode(enc, mask){
  return { type:'CallExpression',
    base:{ type:'MemberExpression', indexer:'.', base:{type:'Identifier',name:'bit32'}, identifier:{type:'Identifier',name:'bxor'} },
    arguments:[ {type:'NumericLiteral',value:enc,raw:String(enc)}, {type:'NumericLiteral',value:mask,raw:String(mask)} ] };
}
function encodeNumbers(ast){
  function walk(node){
    if(!node||typeof node!=='object') return;
    if(Array.isArray(node)){ node.forEach(walk); return; }
    if(node.type==='NumericLiteral'&&node.value!==undefined){
      const n=node.value;
      if(Number.isInteger(n)&&n>=2&&n<=99999){
        if(rand(0,1)===0){
          const a=rand(1,Math.max(2,Math.floor(n/2))); const b=n-a;
          Object.keys(node).forEach(k=>delete node[k]);
          Object.assign(node,{type:'BinaryExpression',operator:'+',
            left:{type:'NumericLiteral',value:a,raw:String(a)},
            right:{type:'NumericLiteral',value:b,raw:String(b)}});
        }else{
          const mask=rand(1,65535); const enc=n^mask;
          const repl=bit32xorNode(enc,mask);
          Object.keys(node).forEach(k=>delete node[k]);
          Object.assign(node,repl);
        }
        return;
      }
    }
    for(const k in node){ const v=node[k]; if(v&&typeof v==='object') walk(v); }
  }
  walk(ast);
}

// ───────────────────────────────────────────────────────────────────
//  LAYER 4a — Control-Flow Flattening (function bodies only)
//
//  Rewrites each function body into a state-machine dispatch loop:
//    local _state = S1
//    while true do
//      if _state == S1 then stmt1; _state = S2
//      elseif _state == S2 then stmt2; _state = S3  ...
//      elseif _state == SN then stmtN; break
//      end
//    end
//  All local declarations are hoisted above the loop so cross-clause
//  references work correctly. Runs after SCOPE RENAME so state-var names
//  are uid()-mangled confusables just like every other local.
// ───────────────────────────────────────────────────────────────────
function flattenControlFlow(ast){
  function collectLocals(stmts){
    const names=[];
    for(const s of stmts){
      if(s.type==='LocalStatement') for(const v of s.variables) names.push(v.name);
      else if(s.type==='FunctionDeclaration'&&s.isLocal&&s.identifier&&s.identifier.type==='Identifier') names.push(s.identifier.name);
    }
    return names;
  }
  function convertLocal(s){
    // local function f()...end  →  make non-local (assigns to already-hoisted local f)
    if(s.type==='FunctionDeclaration'&&s.isLocal){ s.isLocal=false; return s; }
    // local x,y = expr  →  x,y = expr   (hoisted vars already declared above loop)
    if(!s.init||s.init.length===0) return null;
    return {type:'AssignmentStatement',variables:s.variables.map(v=>({type:'Identifier',name:v.name})),init:s.init};
  }
  function flattenBody(stmts){
    if(stmts.length<3) return;
    const localNames=collectLocals(stmts);
    const converted=stmts.map(s=>(s.type==='LocalStatement'||(s.type==='FunctionDeclaration'&&s.isLocal))?convertLocal(s):s).filter(Boolean);
    if(converted.length<2) return;
    const stateIds=converted.map(()=>rand(100000,999999));
    const sv=uid();
    const clauses=converted.map((stmt,i)=>{
      const isLast=i===converted.length-1;
      const body=[stmt];
      if(isLast){
        // ReturnStatement already exits the function — adding break after it is a syntax error in Lua.
        if(stmt.type!=='ReturnStatement') body.push({type:'BreakStatement'});
      } else body.push({type:'AssignmentStatement',variables:[{type:'Identifier',name:sv}],init:[{type:'NumericLiteral',value:stateIds[i+1],raw:String(stateIds[i+1])}]});
      return {type:i===0?'IfClause':'ElseifClause',
        condition:{type:'BinaryExpression',operator:'==',left:{type:'Identifier',name:sv},right:{type:'NumericLiteral',value:stateIds[i],raw:String(stateIds[i])}},
        body};
    });
    const newStmts=[];
    if(localNames.length>0) newStmts.push({type:'LocalStatement',variables:localNames.map(n=>({type:'Identifier',name:n})),init:[]});
    newStmts.push({type:'LocalStatement',variables:[{type:'Identifier',name:sv}],init:[{type:'NumericLiteral',value:stateIds[0],raw:String(stateIds[0])}]});
    newStmts.push({type:'WhileStatement',condition:{type:'BooleanLiteral',value:true,raw:'true'},body:[{type:'IfStatement',clauses}]});
    stmts.length=0; for(const s of newStmts) stmts.push(s);
  }
  function walk(node){
    if(!node||typeof node!=='object') return;
    switch(node.type){
      case 'FunctionDeclaration':case 'FunctionExpression':
        flattenBody(node.body); node.body.forEach(walk); break;
      case 'IfStatement': node.clauses.forEach(c=>{if(c.condition)walk(c.condition);c.body.forEach(walk);}); break;
      case 'WhileStatement': walk(node.condition); node.body.forEach(walk); break;
      case 'RepeatStatement': node.body.forEach(walk); walk(node.condition); break;
      case 'ForNumericStatement': walk(node.start);walk(node.end);if(node.step)walk(node.step);node.body.forEach(walk); break;
      case 'ForGenericStatement': node.iterators.forEach(walk);node.body.forEach(walk); break;
      case 'DoStatement': node.body.forEach(walk); break;
      case 'Chunk': node.body.forEach(walk); break;
      default: for(const k in node){const v=node[k];if(Array.isArray(v))v.forEach(walk);else if(v&&typeof v==='object'&&v.type)walk(v);}
    }
  }
  walk(ast);
}

// ───────────────────────────────────────────────────────────────────
//  LAYER 4b — Dead Code / Junk Code Injection
//
//  Sprinkles unreachable blocks between real statements. Every block
//  uses a condition that is provably always-false at Lua runtime:
//    0 ~= 0  /  1 == 2  /  false  /  v == v+1 (integer literals)
//  All injected names are uid()-generated confusables. Side-effect
//  free: no global writes, no function calls.
// ───────────────────────────────────────────────────────────────────
function injectDeadCode(code){
  const lines=code.split('\n');
  const out=[];
  // Patterns that are ALWAYS false → block never executes
  const pats=[
    ()=>`if (0 ~= 0) then local ${uid()} = ${rand(1,9999)} end`,
    ()=>`if (1 == 2) then local ${uid()} = nil end`,
    ()=>`while (false) do local ${uid()} = "" break end`,
    ()=>{const v=rand(10,9990);return `if (${v} == ${v+1}) then local ${uid()} = ${rand(1,99)} end`;},
    ()=>`do local ${uid()} = nil end`,
    ()=>{const v=rand(2,9998);return `if (${v} ~= ${v}) then local ${uid()} = "${rand(100,999)}" end`;},
    ()=>`if (nil == false) then local ${uid()} = 0 end`,
  ];
  for(const line of lines){
    out.push(line);
    const tr=line.trim();
    // Never inject after 'return' — Lua forbids statements after return in the same block
    if(tr&&!/^return(\s|$)/.test(tr)&&Math.random()<0.28){
      out.push(pats[rand(0,pats.length-1)]());
    }
  }
  return out.join('\n');
}

// ── minify ──
function minify(code){ return code.split('\n').map(l=>l.replace(/\s+/g,' ').trim()).filter(Boolean).join(' '); }

// ───────────────────────────────────────────────────────────────────
//  LAYER 5 — VM VIRTUALIZATION  (the headline)
//
//  The whole hardened script is compiled into encrypted bytecode and a
//  tiny stack-less VM rebuilds + load()s it at runtime. Per build:
//    • randomized opcode numbers (polymorphic dispatch)
//    • randomized reversible cipher pipeline (xor-key / xor-index /
//      xor-const / add-const / sub-const), unique order & constants
//    • rolling key of random length, per-index mixing
//    • anti-tamper Adler-style checksum (refuses to run if modified)
//    • light anti-hook guard on bit32 / string.char
//  Output runs on Roblox Luau (bit32.bxor, no 5.3-only operators).
// ───────────────────────────────────────────────────────────────────
function virtualize(src){
  const enc=new TextEncoder();
  const bytes=Array.from(enc.encode(src));
  const N=bytes.length;

  // rolling key
  const kn=rand(8,16);
  const KEY=[]; for(let i=0;i<kn;i++) KEY.push(rand(1,255));

  // reversible decode pipeline (executed per byte, in order)
  const TYPES=['xork','xori','xorc','addc','subc'];
  const numSteps=rand(4,7);
  const steps=[]; let hasKey=false;
  for(let i=0;i<numSteps;i++){
    const t=TYPES[rand(0,TYPES.length-1)];
    if(t==='xork') hasKey=true;
    steps.push({t, c:(t==='xorc'||t==='addc'||t==='subc')?rand(1,255):null});
  }
  if(!hasKey) steps.push({t:'xork',c:null});

  // opcode map — distinct random ints (polymorphic)
  const usedOps=['HALT', ...new Set(steps.map(s=>s.t))];
  const codes=distinctInts(usedOps.length,17,239);
  const OP={}; usedOps.forEach((o,i)=>OP[o]=codes[i]);

  // flat bytecode program
  const PROG=[];
  for(const s of steps){ PROG.push(OP[s.t]); if(s.c!=null) PROG.push(s.c); }
  PROG.push(OP['HALT']);

  // encrypt: invert the decode pipeline (reverse order, inverse op)
  const E=[];
  for(let i=1;i<=N;i++){
    let acc=bytes[i-1];
    for(let s=steps.length-1;s>=0;s--){
      const st=steps[s];
      if(st.t==='xork')      acc^=KEY[(i-1)%kn];
      else if(st.t==='xori') acc^=((i-1)&255);
      else if(st.t==='xorc') acc^=st.c;
      else if(st.t==='addc') acc=(((acc-st.c)%256)+256)%256; // inverse of +c
      else if(st.t==='subc') acc=(acc+st.c)%256;             // inverse of -c
      acc&=255;
    }
    E.push(acc&255);
  }

  // anti-tamper checksum (must match Lua-side recompute)
  let CK=0;
  for(const v of E)    CK=(CK+v)%65521;
  for(const v of PROG) CK=(CK+v)%65521;

  // names
  const nB=uid(),nK=uid(),nKN=uid(),nP=uid(),nE=uid(),nOut=uid(),nLd=uid(),nFn=uid(),nCk=uid(),nJ=uid(),nI=uid(),nPc=uid(),nOp=uid(),nAcc=uid();

  // dispatch branches for used ops, randomized order
  const branch={
    HALT:`${nOp}==${OP.HALT} then break`,
    xork:`${nOp}==${OP.xork} then ${nAcc}=${nB}(${nAcc},${nK}[((${nI}-1)%${nKN})+1])`,
    xori:`${nOp}==${OP.xori} then ${nAcc}=${nB}(${nAcc},(${nI}-1)%256)`,
    xorc:`${nOp}==${OP.xorc} then ${nAcc}=${nB}(${nAcc},${nP}[${nPc}]) ${nPc}=${nPc}+1`,
    addc:`${nOp}==${OP.addc} then ${nAcc}=(${nAcc}+${nP}[${nPc}])%256 ${nPc}=${nPc}+1`,
    subc:`${nOp}==${OP.subc} then ${nAcc}=(${nAcc}-${nP}[${nPc}])%256 ${nPc}=${nPc}+1`,
  };
  const order=shuffle(usedOps.slice());
  let dispatch='';
  order.forEach((o,idx)=>{ dispatch+=(idx===0?'      if ':'      elseif ')+branch[o]+'\n'; });
  dispatch+='      end';

  // emit Lua (Luau-safe)
  const L=[];
  L.push(`local ${nB}=bit32.bxor`);
  L.push(`local ${nK}={${KEY.join(',')}}`);
  L.push(`local ${nKN}=#${nK}`);
  L.push(`local ${nP}={${PROG.join(',')}}`);
  L.push(`local ${nE}={${E.join(',')}}`);
  // anti-hook guard
  L.push(`if type(bit32)~="table" or type(string.char)~="function" then return end`);
  // anti-tamper
  L.push(`local ${nCk}=0`);
  L.push(`for ${nJ}=1,#${nE} do ${nCk}=(${nCk}+${nE}[${nJ}])%65521 end`);
  L.push(`for ${nJ}=1,#${nP} do ${nCk}=(${nCk}+${nP}[${nJ}])%65521 end`);
  L.push(`if ${nCk}~=${CK} then return end`);
  // VM execute
  L.push(`local ${nOut}={}`);
  L.push(`for ${nI}=1,#${nE} do`);
  L.push(`  local ${nAcc}=${nE}[${nI}]`);
  L.push(`  local ${nPc}=1`);
  L.push(`  while true do`);
  L.push(`    local ${nOp}=${nP}[${nPc}] ${nPc}=${nPc}+1`);
  L.push(dispatch);
  L.push(`  end`);
  L.push(`  ${nOut}[${nI}]=string.char(${nAcc}%256)`);
  L.push(`end`);
  L.push(`local ${nLd}=loadstring or load`);
  L.push(`local ${nFn}=${nLd}(table.concat(${nOut}),"=?")`);
  L.push(`if ${nFn} then return ${nFn}() end`);
  return L.join('\n');
}

// ───────────────────────────────────────────────────────────────────
//  LAYER 6 — DEEP VM  (true virtualization · source is NEVER rebuilt)
//
//  Compiles the script into an INSTRUCTION TREE (pure data) plus a
//  tree-walking VM that executes it directly. There is no load() of
//  your source anywhere — the logic only exists as opcodes + a constant
//  pool. To recover the script an attacker must reverse the whole VM,
//  exactly like commercial VM obfuscators. Per build: randomized opcode
//  ids, randomized constant cipher, mangled VM internals.
//  Trade-off: tree-walking is slower than native — best for logic that
//  isn't in a hot per-frame loop. Runs on Roblox Luau (bit32/getfenv).
// ───────────────────────────────────────────────────────────────────
function compileDeepVM(src){
  const luaparse=window.luaparse||(typeof globalThis!=="undefined"&&globalThis.luaparse)||null;
  const OPN=['NIL','TRUE','FALSE','NUM','STR','VARARG','NAME','INDEX','CALL','MCALL','BIN','UN','AND','OR','TABLE','FUNC',
    'LOCALDECL','ASSIGN','CALLSTAT','IF','WHILE','REPEAT','NUMFOR','GENFOR','RETURN','BREAK','DO','LOCALFUNC'];
  const BINL=['ADD','SUB','MUL','DIV','MOD','POW','CONCAT','EQ','NE','LT','LE','GT','GE','IDIV','BAND','BOR','BXOR','SHL','SHR'];
  const UNL=['NEG','NOT','LEN','BNOT'];
  const ALL=[...OPN,...BINL.map(x=>'B_'+x),...UNL.map(x=>'U_'+x),'SRET','SBRK'];
  const codes=distinctInts(ALL.length,2,4000);
  const O={}; ALL.forEach((n,i)=>O[n]=codes[i]);
  const binId={'+':O.B_ADD,'-':O.B_SUB,'*':O.B_MUL,'/':O.B_DIV,'%':O.B_MOD,'^':O.B_POW,'..':O.B_CONCAT,
    '==':O.B_EQ,'~=':O.B_NE,'<':O.B_LT,'<=':O.B_LE,'>':O.B_GT,'>=':O.B_GE,'//':O.B_IDIV,
    '&':O.B_BAND,'|':O.B_BOR,'~':O.B_BXOR,'<<':O.B_SHL,'>>':O.B_SHR};
  const unId={'-':O.U_NEG,'not':O.U_NOT,'#':O.U_LEN,'~':O.U_BNOT};
  const pool=[]; const numMap=new Map(), strMap=new Map();
  function poolNum(v){ if(numMap.has(v))return numMap.get(v); const i=pool.length+1; pool.push({t:'n',v}); numMap.set(v,i); return i; }
  function decodeStr(raw){ try{ return raw[0]==='"'?JSON.parse(raw):JSON.parse('"'+raw.slice(1,-1).replace(/\\'/g,"'").replace(/"/g,'\\"')+'"'); }catch(e){ return raw.slice(1,-1); } }
  function poolStr(s){ if(strMap.has(s))return strMap.get(s); const i=pool.length+1; pool.push({t:'s',v:s}); strMap.set(s,i); return i; }
  function cExpr(n){
    switch(n.type){
      case 'NilLiteral': return [O.NIL];
      case 'BooleanLiteral': return [n.value?O.TRUE:O.FALSE];
      case 'NumericLiteral': return [O.NUM, poolNum(n.value)];
      case 'StringLiteral': return [O.STR, poolStr(decodeStr(n.raw))];
      case 'VarargLiteral': return [O.VARARG];
      case 'Identifier': return [O.NAME, poolStr(n.name)];
      case 'MemberExpression': return [O.INDEX, cExpr(n.base), [O.STR, poolStr(n.identifier.name)]];
      case 'IndexExpression': return [O.INDEX, cExpr(n.base), cExpr(n.index)];
      case 'CallExpression':
        if(n.base.type==='MemberExpression' && n.base.indexer===':')
          return [O.MCALL, cExpr(n.base.base), poolStr(n.base.identifier.name), n.arguments.map(cExpr)];
        return [O.CALL, cExpr(n.base), n.arguments.map(cExpr)];
      case 'TableCallExpression': return [O.CALL, cExpr(n.base), [cExpr(n.arguments)]];
      case 'StringCallExpression': return [O.CALL, cExpr(n.base), [cExpr(n.argument)]];
      case 'BinaryExpression': return [O.BIN, binId[n.operator], cExpr(n.left), cExpr(n.right)];
      case 'LogicalExpression': return [n.operator==='and'?O.AND:O.OR, cExpr(n.left), cExpr(n.right)];
      case 'UnaryExpression': return [O.UN, unId[n.operator], cExpr(n.argument)];
      case 'TableConstructorExpression':
        return [O.TABLE, n.fields.map(f=>{
          if(f.type==='TableValue') return [0, cExpr(f.value)];
          if(f.type==='TableKey') return [1, cExpr(f.key), cExpr(f.value)];
          return [2, poolStr(f.key.name), cExpr(f.value)];
        })];
      case 'FunctionDeclaration': {
        let varg=0; const ps=[];
        n.parameters.forEach(p=>{ if(p.type==='VarargLiteral') varg=1; else ps.push(poolStr(p.name)); });
        return [O.FUNC, ps, varg, n.body.map(cStat)];
      }
      default: throw new Error('deepvm expr '+n.type);
    }
  }
  function cStat(n){
    switch(n.type){
      case 'LocalStatement': return [O.LOCALDECL, n.variables.map(v=>poolStr(v.name)), (n.init||[]).map(cExpr)];
      case 'AssignmentStatement': return [O.ASSIGN, n.variables.map(cExpr), n.init.map(cExpr)];
      case 'CallStatement': return [O.CALLSTAT, cExpr(n.expression)];
      case 'IfStatement': return [O.IF, n.clauses.map(c=>{
        if(c.type==='ElseClause') return [0, c.body.map(cStat)];
        return [cExpr(c.condition), c.body.map(cStat)];
      })];
      case 'WhileStatement': return [O.WHILE, cExpr(n.condition), n.body.map(cStat)];
      case 'RepeatStatement': return [O.REPEAT, n.body.map(cStat), cExpr(n.condition)];
      case 'ForNumericStatement': return [O.NUMFOR, poolStr(n.variable.name), cExpr(n.start), cExpr(n.end), n.step?cExpr(n.step):0, n.body.map(cStat)];
      case 'ForGenericStatement': return [O.GENFOR, n.variables.map(v=>poolStr(v.name)), n.iterators.map(cExpr), n.body.map(cStat)];
      case 'ReturnStatement': return [O.RETURN, n.arguments.map(cExpr)];
      case 'BreakStatement': return [O.BREAK];
      case 'DoStatement': return [O.DO, n.body.map(cStat)];
      case 'FunctionDeclaration': {
        let varg=0; const ps=[];
        n.parameters.forEach(p=>{ if(p.type==='VarargLiteral') varg=1; else ps.push(poolStr(p.name)); });
        if(n.isLocal) return [O.LOCALFUNC, poolStr(n.identifier.name), [O.FUNC, ps, varg, n.body.map(cStat)]];
        let idn=n.identifier;
        if(idn.type==='MemberExpression' && idn.indexer===':'){ ps.unshift(poolStr('self')); idn={type:'MemberExpression',indexer:'.',base:idn.base,identifier:idn.identifier}; }
        return [O.ASSIGN, [cExpr(idn)], [[O.FUNC, ps, varg, n.body.map(cStat)]]];
      }
      default: throw new Error('deepvm stat '+n.type);
    }
  }
  function lit(x){ if(Array.isArray(x)) return '{'+x.map(lit).join(',')+'}'; if(typeof x==='number') return String(x); throw new Error('deepvm lit'); }
  function luaNum(v){ if(Number.isInteger(v)) return String(v); let s=String(v); if(!/[.eE]/.test(s))s+='.0'; return s; }

  const ast=luaparse.parse(src,{scope:false,luaVersion:'5.3',comments:false});
  const PROG=ast.body.map(cStat);
  const progLit=lit(PROG);
  const skey=rand(40,200);
  const N={}; ['dstr','K','G','getV','setV','evE','evM','evL','exB','exS','mkC','luVA','PROG','RET','BRK','bit','main'].forEach(k=>N[k]=uid());
  const opNames={}; ALL.forEach(a=>opNames[a]=uid());
  const opDecl='local '+ALL.map(a=>opNames[a]).join(',')+'='+ALL.map(a=>O[a]).join(',');
  const $=k=>opNames[k];
  let poolSrc='local '+N.dstr+'=function(b)local r={} for i=1,#b do r[i]=string.char('+N.bit+'.bxor(b[i],'+skey+'))end return table.concat(r)end\nlocal '+N.K+'={}\n';
  pool.forEach((e,i)=>{
    if(e.t==='n') poolSrc+=N.K+'['+(i+1)+']='+luaNum(e.v)+'\n';
    else { const bytes=Array.from(new TextEncoder().encode(e.v)).map(c=>(c^skey)&255); poolSrc+=N.K+'['+(i+1)+']='+N.dstr+'({'+bytes.join(',')+'})\n'; }
  });

  // Junk opcode branches — IDs in 5000-9999 never appear in PROG but bloat & confuse the dispatcher
  const junkCount=rand(14,22);
  const junkIds=distinctInts(junkCount,5000,9999);
  const junkBranchE=junkIds.map(id=>`  elseif t==${id} then local ${uid()}=nil`).join('\n');
  const junkBranchS=junkIds.map(id=>`  elseif t==${id} then local ${uid()}=nil`).join('\n');

  const RT=`
local ${N.getV},${N.setV},${N.evE},${N.evM},${N.evL},${N.exB},${N.exS},${N.mkC},${N.luVA}
${N.getV}=function(env,name) local e=env while e do if e.d[name] then return e.v[name] end e=e.up end return ${N.G}[name] end
${N.setV}=function(env,name,val) local e=env while e do if e.d[name] then e.v[name]=val return end e=e.up end ${N.G}[name]=val end
${N.luVA}=function(env) local e=env while e do if e.va then return e.va end e=e.up end return {n=0} end
${N.evM}=function(node,env) local t=node[1]
  if t==${$('CALL')} then local f=${N.evE}(node[2],env) local a=${N.evL}(node[3],env) return f(table.unpack(a,1,a.n))
  elseif t==${$('MCALL')} then local b=${N.evE}(node[2],env) local m=b[${N.K}[node[3]]] local a=${N.evL}(node[4],env) local args={b} for i=1,a.n do args[i+1]=a[i] end return m(table.unpack(args,1,a.n+1))
  elseif t==${$('VARARG')} then local va=${N.luVA}(env) return table.unpack(va,1,va.n)
  else return ${N.evE}(node,env) end end
${N.evL}=function(list,env) local out,n={},0 local len=#list
  for i=1,len do if i==len then local nd=list[i] local t=nd[1]
      if t==${$('CALL')} or t==${$('MCALL')} or t==${$('VARARG')} then local vs=table.pack(${N.evM}(nd,env)) for j=1,vs.n do n=n+1 out[n]=vs[j] end
      else n=n+1 out[n]=${N.evE}(nd,env) end
    else n=n+1 out[n]=${N.evE}(list[i],env) end end
  out.n=n return out end
${N.evE}=function(node,env) local t=node[1]
  if t==${$('NIL')} then return nil
  elseif t==${$('TRUE')} then return true
  elseif t==${$('FALSE')} then return false
  elseif t==${$('NUM')} then return ${N.K}[node[2]]
  elseif t==${$('STR')} then return ${N.K}[node[2]]
  elseif t==${$('NAME')} then return ${N.getV}(env,${N.K}[node[2]])
  elseif t==${$('VARARG')} then local va=${N.luVA}(env) return va[1]
  elseif t==${$('INDEX')} then local b=${N.evE}(node[2],env) return b[${N.evE}(node[3],env)]
  elseif t==${$('CALL')} or t==${$('MCALL')} then local r=table.pack(${N.evM}(node,env)) return r[1]
  elseif t==${$('AND')} then local l=${N.evE}(node[2],env) if not l then return l end return ${N.evE}(node[3],env)
  elseif t==${$('OR')} then local l=${N.evE}(node[2],env) if l then return l end return ${N.evE}(node[3],env)
  elseif t==${$('UN')} then local o=node[2] local a=${N.evE}(node[3],env)
    if o==${$('U_NEG')} then return -a elseif o==${$('U_NOT')} then return not a elseif o==${$('U_LEN')} then return #a else return ${N.bit}.bnot(a) end
  elseif t==${$('BIN')} then local o=node[2] local a=${N.evE}(node[3],env) local b=${N.evE}(node[4],env)
    if o==${$('B_ADD')} then return a+b elseif o==${$('B_SUB')} then return a-b elseif o==${$('B_MUL')} then return a*b
    elseif o==${$('B_DIV')} then return a/b elseif o==${$('B_MOD')} then return a%b elseif o==${$('B_POW')} then return a^b
    elseif o==${$('B_CONCAT')} then return a..b elseif o==${$('B_EQ')} then return a==b elseif o==${$('B_NE')} then return a~=b
    elseif o==${$('B_LT')} then return a<b elseif o==${$('B_LE')} then return a<=b elseif o==${$('B_GT')} then return a>b
    elseif o==${$('B_GE')} then return a>=b elseif o==${$('B_IDIV')} then return math.floor(a/b)
    elseif o==${$('B_BAND')} then return ${N.bit}.band(a,b) elseif o==${$('B_BOR')} then return ${N.bit}.bor(a,b)
    elseif o==${$('B_BXOR')} then return ${N.bit}.bxor(a,b) elseif o==${$('B_SHL')} then return ${N.bit}.lshift(a,b) else return ${N.bit}.rshift(a,b) end
  elseif t==${$('TABLE')} then local tb={} local fl=node[2] local ai=1
    for i=1,#fl do local f=fl[i] local k=f[1]
      if k==0 then if i==#fl then local nd=f[2] local tt=nd[1]
          if tt==${$('CALL')} or tt==${$('MCALL')} or tt==${$('VARARG')} then local vs=table.pack(${N.evM}(nd,env)) for j=1,vs.n do tb[ai]=vs[j] ai=ai+1 end
          else tb[ai]=${N.evE}(nd,env) ai=ai+1 end
        else tb[ai]=${N.evE}(f[2],env) ai=ai+1 end
      elseif k==1 then tb[${N.evE}(f[2],env)]=${N.evE}(f[3],env)
      else tb[${N.K}[f[2]]]=${N.evE}(f[3],env) end end
    return tb
  elseif t==${$('FUNC')} then return ${N.mkC}(node,env)
${junkBranchE}  end end
${N.mkC}=function(node,defEnv) local params=node[2] local varg=node[3] local body=node[4]
  return function(...) local sc={v={},d={},up=defEnv} local args=table.pack(...)
    for i=1,#params do local nm=${N.K}[params[i]] sc.d[nm]=true sc.v[nm]=args[i] end
    if varg==1 then local va={} local c=0 for i=#params+1,args.n do c=c+1 va[c]=args[i] end va.n=c sc.va=va end
    local sig,vals=${N.exB}(body,sc)
    if sig==${N.RET} then return table.unpack(vals,1,vals.n) end end end
${N.exB}=function(body,env) for i=1,#body do local sig,vals=${N.exS}(body[i],env) if sig then return sig,vals end end end
${N.exS}=function(node,env) local t=node[1]
  if t==${$('CALLSTAT')} then ${N.evM}(node[2],env)
  elseif t==${$('LOCALDECL')} then local names=node[2] local vals=${N.evL}(node[3],env)
    for i=1,#names do local nm=${N.K}[names[i]] env.d[nm]=true env.v[nm]=vals[i] end
  elseif t==${$('ASSIGN')} then local tg=node[2] local vals=${N.evL}(node[3],env)
    for i=1,#tg do local tn=tg[i] if tn[1]==${$('NAME')} then ${N.setV}(env,${N.K}[tn[2]],vals[i])
      else local b=${N.evE}(tn[2],env) b[${N.evE}(tn[3],env)]=vals[i] end end
  elseif t==${$('IF')} then local cl=node[2]
    for i=1,#cl do local c=cl[i] if type(c[1])=='table' then if ${N.evE}(c[1],env) then return ${N.exB}(c[2],{v={},d={},up=env}) end
      else return ${N.exB}(c[2],{v={},d={},up=env}) end end
  elseif t==${$('WHILE')} then while ${N.evE}(node[2],env) do local sig,vals=${N.exB}(node[3],{v={},d={},up=env})
      if sig==${N.BRK} then break elseif sig==${N.RET} then return sig,vals end end
  elseif t==${$('REPEAT')} then repeat local sc={v={},d={},up=env} local sig,vals=${N.exB}(node[2],sc)
      if sig==${N.BRK} then break elseif sig==${N.RET} then return sig,vals end until ${N.evE}(node[3],sc)
  elseif t==${$('NUMFOR')} then local nm=${N.K}[node[2]] local a=${N.evE}(node[3],env) local b=${N.evE}(node[4],env)
    local st=1 if node[5]~=0 then st=${N.evE}(node[5],env) end local i=a
    while (st>0 and i<=b) or (st<0 and i>=b) do local sc={v={},d={},up=env} sc.d[nm]=true sc.v[nm]=i
      local sig,vals=${N.exB}(node[6],sc) if sig==${N.BRK} then break elseif sig==${N.RET} then return sig,vals end i=i+st end
  elseif t==${$('GENFOR')} then local names=node[2] local it=${N.evL}(node[3],env) local f,s,ctl=it[1],it[2],it[3]
    while true do local rs=table.pack(f(s,ctl)) if rs[1]==nil then break end ctl=rs[1]
      local sc={v={},d={},up=env} for i=1,#names do local nm=${N.K}[names[i]] sc.d[nm]=true sc.v[nm]=rs[i] end
      local sig,vals=${N.exB}(node[4],sc) if sig==${N.BRK} then break elseif sig==${N.RET} then return sig,vals end end
  elseif t==${$('DO')} then return ${N.exB}(node[2],{v={},d={},up=env})
  elseif t==${$('LOCALFUNC')} then local nm=${N.K}[node[2]] env.d[nm]=true env.v[nm]=${N.evE}(node[3],env)
  elseif t==${$('RETURN')} then return ${N.RET},${N.evL}(node[2],env)
  elseif t==${$('BREAK')} then return ${N.BRK}
${junkBranchS}  end end
local ${N.main}={v={},d={},up=nil,va={n=0}} ${N.exB}(${N.PROG},${N.main})
`;
  return minify(`local ${N.bit}=bit32
local ${N.G}=(getfenv and getfenv(0)) or _G or _ENV
${opDecl}
local ${N.RET},${N.BRK}=${$('SRET')},${$('SBRK')}
${poolSrc}local ${N.PROG}=${progLit}
${RT}`);
}

// ───────────────────────────────────────────────────────────────────
//  LAYER 7 — FLAT BYTECODE VM
//
//  Compiles the script to a FLAT instruction array — every instruction
//  is a short tuple {op, a, b, c} with small randomized opcode IDs.
//  A per-build dispatch-table VM executes them; there is no source
//  reconstruction and no load() call.  Output looks like:
//    {{5,1},{4,2},{10,1},{13,0},...}
//  which AI and humans alike cannot easily map back to logic.
//  Stack-based: values accumulate on a Lua array; function calls, math,
//  table ops, control flow, closures all fully supported.
// ───────────────────────────────────────────────────────────────────
function compileFlatVM(src){
  const luaparse=window.luaparse||(typeof globalThis!=='undefined'&&globalThis.luaparse)||null;

  // ── opcodes (randomized per build) ──────────────────────────────
  const OPN=['LNIL','LTRUE','LFALSE','LK','LNAME','GETI',
    'SETI','SETIEXP','STORE','STOREM','EXTEND','EXPAND',
    'CALL','CALLM','CSTAT','MCALL','MCALLM','MSTAT',
    'ADD','SUB','MUL','DIV','MOD','POW','CAT',
    'EQ','NE','LT','LE','GT','GE','IDF',
    'BAND','BOR','BXOR','BLSH','BRSH',
    'NEG','NOT','LEN','BNOT','AND','OR',
    'JMP','JF','JT',
    'NEWTAB','TSETA','TSETK','TSETE','TSETM',
    'DECL','MKF','VA','VAM','RET','BRK',
    'FNUMPREP','FNUMCHK','FNUMSTP','FGENPREP','FGENCHK'];
  const codes=distinctInts(OPN.length,3,254);
  const O={}; OPN.forEach((n,i)=>O[n]=codes[i]);

  // ── constant pool ───────────────────────────────────────────────
  const pool=[]; const numMap=new Map(); const strMap=new Map();
  function poolNum(v){if(numMap.has(v))return numMap.get(v);const i=pool.length+1;pool.push({t:'n',v});numMap.set(v,i);return i;}
  function dstr(raw){try{return raw[0]==='"'?JSON.parse(raw):JSON.parse('"'+raw.slice(1,-1).replace(/\\'/g,"'").replace(/"/g,'\\"')+'"');}catch(e){return raw.slice(1,-1);}}
  function poolStr(s){if(strMap.has(s))return strMap.get(s);const i=pool.length+1;pool.push({t:'s',v:s});strMap.set(s,i);return i;}

  // ── per-function (proto) compiler ───────────────────────────────
  const protos=[];

  function buildProto(params,hasVararg,bodyStmts){
    const I=[]; // flat instruction array
    const bp=[]; // break-target patch stack

    const emit=(...args)=>{I.push(args);return I.length-1;};
    const patch=(idx,pos,v)=>{I[idx][pos]=v;};
    const here=()=>I.length;

    // ── expression: pushes exactly ONE value ──
    function cExpr(n){
      switch(n.type){
        case 'NilLiteral': emit(O.LNIL); break;
        case 'BooleanLiteral': emit(n.value?O.LTRUE:O.LFALSE); break;
        case 'NumericLiteral': emit(O.LK,poolNum(n.value)); break;
        case 'StringLiteral': emit(O.LK,poolStr(dstr(n.raw))); break;
        case 'VarargLiteral': emit(O.VA); break;
        case 'Identifier': emit(O.LNAME,poolStr(n.name)); break;
        case 'MemberExpression':
          cExpr(n.base); emit(O.LK,poolStr(n.identifier.name)); emit(O.GETI); break;
        case 'IndexExpression':
          cExpr(n.base); cExpr(n.index); emit(O.GETI); break;
        case 'CallExpression':
        case 'TableCallExpression':
        case 'StringCallExpression':
          cCallSingle(n); break;
        case 'BinaryExpression':{
          const bm={'+':O.ADD,'-':O.SUB,'*':O.MUL,'/':O.DIV,'%':O.MOD,'^':O.POW,'..':O.CAT,
            '==':O.EQ,'~=':O.NE,'<':O.LT,'<=':O.LE,'>':O.GT,'>=':O.GE,'//':O.IDF,
            '&':O.BAND,'|':O.BOR,'~':O.BXOR,'<<':O.BLSH,'>>':O.BRSH};
          cExpr(n.left); cExpr(n.right); emit(bm[n.operator]); break;
        }
        case 'UnaryExpression':{
          const um={'-':O.NEG,'not':O.NOT,'#':O.LEN,'~':O.BNOT};
          cExpr(n.argument); emit(um[n.operator]); break;
        }
        case 'LogicalExpression':{
          cExpr(n.left);
          const j=emit(n.operator==='and'?O.AND:O.OR,0);
          cExpr(n.right);
          patch(j,1,here()-j-1); break;
        }
        case 'TableConstructorExpression':{
          emit(O.NEWTAB);
          const fl=n.fields;
          for(let i=0;i<fl.length;i++){
            const f=fl[i],last=i===fl.length-1;
            if(f.type==='TableValue'){ if(last){cExprM(f.value);emit(O.TSETM);}else{cExpr(f.value);emit(O.TSETA);} }
            else if(f.type==='TableKey'){ cExpr(f.key);cExpr(f.value);emit(O.TSETE); }
            else{ cExpr(f.value);emit(O.TSETK,poolStr(f.key.name)); }
          } break;
        }
        case 'FunctionExpression':
        case 'FunctionDeclaration':{
          let varg=0;const ps=[];
          n.parameters.forEach(p=>{if(p.type==='VarargLiteral')varg=1;else ps.push(poolStr(p.name));});
          emit(O.MKF,buildProto(ps,varg,n.body)); break;
        }
        default: throw new Error('flatvm expr: '+n.type);
      }
    }

    // multi-value expression (for last in arg/rhs list)
    function cExprM(n){
      if(n.type==='VarargLiteral'){emit(O.VAM);return;}
      if(n.type==='CallExpression'||n.type==='TableCallExpression'||n.type==='StringCallExpression'){cCallMulti(n);return;}
      cExpr(n);
    }

    // push fn/obj + args, emit single-return CALL
    function cCallSingle(n){
      if(n.type==='TableCallExpression'){cExpr(n.base);cExpr(n.arguments);emit(O.CALL,1);return;}
      if(n.type==='StringCallExpression'){cExpr(n.base);cExpr(n.argument);emit(O.CALL,1);return;}
      if(n.base.type==='MemberExpression'&&n.base.indexer===':'){
        cExpr(n.base.base);const na=cArgs(n.arguments);emit(O.MCALL,poolStr(n.base.identifier.name),na);
      }else{cExpr(n.base);const na=cArgs(n.arguments);emit(O.CALL,na);}
    }

    // multi-return CALL variant
    function cCallMulti(n){
      if(n.type==='TableCallExpression'){cExpr(n.base);cExpr(n.arguments);emit(O.CALLM,1);return;}
      if(n.type==='StringCallExpression'){cExpr(n.base);cExpr(n.argument);emit(O.CALLM,1);return;}
      if(n.base.type==='MemberExpression'&&n.base.indexer===':'){
        cExpr(n.base.base);const na=cArgs(n.arguments);emit(O.MCALLM,poolStr(n.base.identifier.name),na);
      }else{cExpr(n.base);const na=cArgs(n.arguments);emit(O.CALLM,na);}
    }

    // compile arg list; returns arg count (negative if last is multi)
    function cArgs(args){
      const n=args.length; if(n===0) return 0;
      for(let i=0;i<n-1;i++) cExpr(args[i]);
      const last=args[n-1];
      if(last.type==='CallExpression'||last.type==='TableCallExpression'||
         last.type==='StringCallExpression'||last.type==='VarargLiteral'){
        cExprM(last); return -(n); // negative = (n-1) fixed + multi last
      }
      cExpr(last); return n;
    }

    // ── assignment helper: evaluates rhs, assigns to targets right-to-left ──
    function cAssign(targets,vals,isLocal){
      const vc=vals.length,tc=targets.length;
      for(let i=0;i<vc-1;i++) cExpr(vals[i]);
      if(vc>0){
        const last=vals[vc-1];
        const isM=last.type==='CallExpression'||last.type==='TableCallExpression'||
          last.type==='StringCallExpression'||last.type==='VarargLiteral';
        if(isM){cExprM(last);emit(O.EXPAND,tc,vc-1);}
        else{cExpr(last);emit(O.EXTEND,tc,vc);}
      }else emit(O.EXTEND,tc,0);

      // assign right-to-left (so leftmost value ends up at bottom for leftmost target)
      for(let i=tc-1;i>=0;i--){
        const t=targets[i];
        if(isLocal||t.type==='Identifier'){
          emit(O.STORE,poolStr(isLocal?t.name:(t.name||t.identifier?.name)));
        }else if(t.type==='MemberExpression'){
          cExpr(t.base); emit(O.SETI,poolStr(t.identifier.name));
        }else if(t.type==='IndexExpression'){
          cExpr(t.base);cExpr(t.index); emit(O.SETIEXP);
        }
      }
    }

    // ── statements ──
    function cBody(stmts){stmts.forEach(cStat);}

    function cStat(n){
      switch(n.type){
        case 'LocalStatement':
          cAssign(n.variables,n.init||[],true);
          // convert STOREs to DECLs: the last tc STORE instrs should be DECL
          // Actually, use DECL opcode: declare names and pop values
          // Re-emit: instead of STORE, emit DECL for each name
          // But cAssign already emitted STORE... let me use a different approach:
          // Just mark them as local declarations by emitting DECL after
          {
            // undo last tc STORE instrs, replace with DECL + names
            const tc=n.variables.length;
            const names=n.variables.map(v=>poolStr(v.name));
            // Remove the tc STORE instrs we just added (they were for isLocal targets)
            for(let i=0;i<tc;i++) I.pop();
            // Emit DECL: pops tc values (right-to-left order), declares them
            I.push([O.DECL,tc,...names]);
          }
          break;
        case 'AssignmentStatement':
          cAssign(n.variables,n.init,false);
          break;
        case 'CallStatement':
          if(n.expression.type==='CallExpression'||n.expression.type==='TableCallExpression'||n.expression.type==='StringCallExpression'){
            if(n.expression.type==='TableCallExpression'){cExpr(n.expression.base);cExpr(n.expression.arguments);emit(O.CSTAT,1);}
            else if(n.expression.type==='StringCallExpression'){cExpr(n.expression.base);cExpr(n.expression.argument);emit(O.CSTAT,1);}
            else if(n.expression.base.type==='MemberExpression'&&n.expression.base.indexer===':'){
              cExpr(n.expression.base.base);const na=cArgs(n.expression.arguments);emit(O.MSTAT,poolStr(n.expression.base.identifier.name),na);
            }else{cExpr(n.expression.base);const na=cArgs(n.expression.arguments);emit(O.CSTAT,na);}
          }
          break;
        case 'IfStatement':{
          const endPs=[];
          for(const cl of n.clauses){
            let cj=-1;
            if(cl.type!=='ElseClause'){cExpr(cl.condition);cj=emit(O.JF,0);}
            cBody(cl.body);
            endPs.push(emit(O.JMP,0));
            if(cj>=0) patch(cj,1,here()-cj-1);
          }
          endPs.forEach(p=>patch(p,1,here()-p-1)); break;
        }
        case 'WhileStatement':{
          const ls=here(); cExpr(n.condition);const cj=emit(O.JF,0);
          bp.push({p:[]}); cBody(n.body);
          emit(O.JMP,ls-here()-1); patch(cj,1,here()-cj-1);
          bp.pop().p.forEach(p=>patch(p,1,here()-p-1)); break;
        }
        case 'RepeatStatement':{
          const ls=here(); bp.push({p:[]});
          cBody(n.body); cExpr(n.condition); emit(O.JF,ls-here()-1);
          bp.pop().p.forEach(p=>patch(p,1,here()-p-1)); break;
        }
        case 'ForNumericStatement':{
          cExpr(n.start);cExpr(n.end);
          if(n.step)cExpr(n.step);else emit(O.LK,poolNum(1));
          const vn=poolStr(n.variable.name);
          emit(O.FNUMPREP,vn); // pops step,limit,start; stores in hidden state; declares var
          const ck=here(); const cj=emit(O.FNUMCHK,vn,0); // jump if done
          bp.push({p:[]}); cBody(n.body);
          emit(O.FNUMSTP,vn); emit(O.JMP,ck-here()-1);
          patch(cj,2,here()-cj-1);
          bp.pop().p.forEach(p=>patch(p,1,here()-p-1)); break;
        }
        case 'ForGenericStatement':{
          n.iterators.forEach(cExpr);
          const names=n.variables.map(v=>poolStr(v.name));
          I.push([O.FGENPREP,n.iterators.length,...names]); // pops iters, sets up
          const ck=here(); const cj=I.push([O.FGENCHK,names[0],0])-1; // jump if done
          bp.push({p:[]}); cBody(n.body);
          emit(O.JMP,ck-here()-1); patch(cj,2,here()-cj-1);
          bp.pop().p.forEach(p=>patch(p,1,here()-p-1)); break;
        }
        case 'ReturnStatement':{
          const args=n.arguments,ac=args.length;
          for(let i=0;i<ac-1;i++) cExpr(args[i]);
          if(ac>0) cExprM(args[ac-1]);
          emit(O.RET,ac); break;
        }
        case 'BreakStatement':{
          const p=emit(O.JMP,0);
          if(bp.length>0) bp[bp.length-1].p.push(p); break;
        }
        case 'DoStatement': cBody(n.body); break;
        case 'FunctionDeclaration':{
          let varg=0;const ps=[];
          n.parameters.forEach(p=>{if(p.type==='VarargLiteral')varg=1;else ps.push(poolStr(p.name));});
          const pid=buildProto(ps,varg,n.body);
          emit(O.MKF,pid);
          if(n.isLocal){
            I.push([O.DECL,1,poolStr(n.identifier.name)]);
          }else if(n.identifier.type==='Identifier'){
            emit(O.STORE,poolStr(n.identifier.name));
          }else if(n.identifier.type==='MemberExpression'){
            cExpr(n.identifier.base);emit(O.SETI,poolStr(n.identifier.identifier.name));
          } break;
        }
        default: throw new Error('flatvm stat: '+n.type);
      }
    }

    // emit parameter setup at function entry
    if(params.length>0||hasVararg){
      I.push([O.DECL,params.length,...params,hasVararg?1:0]);
      // First DECL in a function is treated as param-binding by the runtime
    }
    cBody(bodyStmts);
    if(!I.length||I[I.length-1][0]!==O.RET) emit(O.RET,0);

    const pid=protos.length+1; protos.push(I); return pid;
  }

  // ── parse + compile ────────────────────────────────────────────
  const ast=luaparse.parse(src,{scope:false,luaVersion:'5.3',comments:false});
  buildProto([],1,ast.body); // top-level is proto 1, vararg=true
  const mainPid=1;

  // ── emit constant pool ─────────────────────────────────────────
  const skey=rand(30,220);
  const N={}; ['G','K','dstr','F','vm','env','bit','S','VA'].forEach(k=>N[k]=uid());
  let poolSrc=`local ${N.dstr}=function(b)local r={}for i=1,#b do r[i]=string.char(bit32.bxor(b[i],${skey}))end return table.concat(r)end\nlocal ${N.K}={}\n`;
  pool.forEach((e,i)=>{
    if(e.t==='n') poolSrc+=`${N.K}[${i+1}]=${Number.isInteger(e.v)?e.v:e.v%1===0?e.v:e.v.toString().includes('.')?e.v:e.v+'.0'}\n`;
    else{const bytes=Array.from(new TextEncoder().encode(e.v)).map(c=>(c^skey)&255);poolSrc+=`${N.K}[${i+1}]=${N.dstr}({${bytes.join(',')}})\n`;}
  });

  // ── emit proto tables ──────────────────────────────────────────
  const protoLit='{'+protos.map(p=>'{'+p.map(ins=>'{'+ins.join(',')+'}'). join(',')+'}'). join(',\n')+'}';

  // ── emit VM runtime (dispatch-table based) ─────────────────────
  const $ = k => O[k]; // opcode ID
  // Randomize dispatch table key order for extra confusion
  const dispKeys=shuffle(Object.keys(O).slice());

  const RT=`local ${N.G}=(getfenv and getfenv(0))or _G or _ENV
local ${N.bit}=bit32
local ${N.S}={}
${poolSrc}
local ${N.F}=${protoLit}
local ${N.vm}
${N.vm}=function(pid,env,...)
  local prog=${N.F}[pid] local pc=1 local stk={} local sp=0
  local K=${N.K} local G=${N.G} local bit=${N.bit} local F=${N.F}
  local function getV(e,k) while e do if e.d[k] then return e.v[k] end e=e.up end return G[k] end
  local function setV(e,k,v) while e do if e.d[k] then e.v[k]=v return end e=e.up end G[k]=v end
  local function decl(e,k,v) e.d[k]=true e.v[k]=v end
  local function mksc(up) return{v={},d={},up=up} end
  local function callF(pid2,sc,...) return ${N.vm}(pid2,sc,...) end
  local function packM(f,...) local r=table.pack(f(...)) return r end
  local bit=bit32
  -- initialize varargs
  local _va=table.pack(...) env.va=_va
  -- first instruction: if it's DECL, bind params (pid > 1 means it's a function)
  if pid>1 then
    local ins=prog[1]
    if ins[1]==${$('DECL')} then
      local n=ins[2] local args=table.pack(...)
      for i=1,n do decl(env,K[ins[2+i]],args[i]) end
      if ins[2+n+1]==1 then local va={} for i=n+1,args.n do va[i-n]=args[i] end va.n=args.n-n env.va=va end
      pc=2
    end
  end
  local done=false local retv
  while not done do
    local ins=prog[pc] pc=pc+1 local op=ins[1]
    if op==${$('LNIL')} then sp=sp+1 stk[sp]=nil
    elseif op==${$('LTRUE')} then sp=sp+1 stk[sp]=true
    elseif op==${$('LFALSE')} then sp=sp+1 stk[sp]=false
    elseif op==${$('LK')} then sp=sp+1 stk[sp]=K[ins[2]]
    elseif op==${$('LNAME')} then sp=sp+1 stk[sp]=getV(env,K[ins[2]])
    elseif op==${$('VA')} then sp=sp+1 stk[sp]=(env.va or{n=0})[1]
    elseif op==${$('VAM')} then local va=env.va or{n=0} for i=1,va.n do sp=sp+1 stk[sp]=va[i] end sp=sp+1 stk[sp]=va.n -- multi-return marker
    elseif op==${$('GETI')} then local k=stk[sp] sp=sp-1 stk[sp]=stk[sp][k]
    elseif op==${$('NEWTAB')} then sp=sp+1 stk[sp]={}
    elseif op==${$('TSETA')} then local v=stk[sp] sp=sp-1 local t=stk[sp] t[#t+1]=v
    elseif op==${$('TSETK')} then local v=stk[sp] sp=sp-1 stk[sp][K[ins[2]]]=v
    elseif op==${$('TSETE')} then local v=stk[sp] sp=sp-1 local k=stk[sp] sp=sp-1 stk[sp][k]=v
    elseif op==${$('TSETM')} then
      -- expand multi-return into table array section
      local t=stk[sp-1] local cnt=stk[sp] sp=sp-1
      if type(cnt)=='number' then for i=cnt,1,-1 do t[#t+1]=stk[sp-cnt+i] end sp=sp-cnt
      else t[#t+1]=stk[sp] sp=sp-1 end
    elseif op==${$('MKF')} then
      local pid2=ins[2] local sc=mksc(env)
      sp=sp+1 stk[sp]=function(...) return callF(pid2,mksc(env),...) end
    elseif op==${$('CALL')} then
      local na=ins[2] local fn=stk[sp-na] local a={}
      for i=1,na do a[i]=stk[sp-na+i] end sp=sp-na
      stk[sp]=fn(table.unpack(a,1,na))
    elseif op==${$('CALLM')} then
      local na=ins[2] local fn=stk[sp-na] local a={}
      for i=1,na do a[i]=stk[sp-na+i] end sp=sp-na
      local r=table.pack(fn(table.unpack(a,1,na)))
      for i=1,r.n do stk[sp+i]=r[i] end sp=sp+r.n stk[sp+1]=r.n sp=sp+1
    elseif op==${$('CSTAT')} then
      local na=ins[2] local fn=stk[sp-na] local a={}
      for i=1,na do a[i]=stk[sp-na+i] end sp=sp-na-1 fn(table.unpack(a,1,na))
    elseif op==${$('MCALL')} then
      local meth=K[ins[2]] local na=ins[3] local obj=stk[sp-na]
      local a={obj} for i=1,na do a[i+1]=stk[sp-na+i] end sp=sp-na
      stk[sp]=obj[meth](table.unpack(a,1,na+1))
    elseif op==${$('MCALLM')} then
      local meth=K[ins[2]] local na=ins[3] local obj=stk[sp-na]
      local a={obj} for i=1,na do a[i+1]=stk[sp-na+i] end sp=sp-na
      local r=table.pack(obj[meth](table.unpack(a,1,na+1)))
      for i=1,r.n do stk[sp+i]=r[i] end sp=sp+r.n stk[sp+1]=r.n sp=sp+1
    elseif op==${$('MSTAT')} then
      local meth=K[ins[2]] local na=ins[3] local obj=stk[sp-na]
      local a={obj} for i=1,na do a[i+1]=stk[sp-na+i] end sp=sp-na-1 obj[meth](table.unpack(a,1,na+1))
    elseif op==${$('EXTEND')} then
      local tc=ins[2] local vc=ins[3]
      while vc<tc do sp=sp+1 stk[sp]=nil vc=vc+1 end
      -- pop excess
      if vc>tc then sp=sp-(vc-tc) end
    elseif op==${$('EXPAND')} then
      local tc=ins[2] local fixed=ins[3]
      -- top of stack is multi-return marker (count), then values, then fixed values
      local cnt=stk[sp] sp=sp-1 -- pop count
      -- collect multi values
      local mv={} for i=cnt,1,-1 do mv[cnt-i+1]=stk[sp-cnt+i+1] end sp=sp-cnt
      -- now stack has fixed values; total available = fixed+cnt; need tc
      local total=fixed+cnt
      if total<tc then for i=total+1,tc do sp=sp+1 stk[sp]=nil end
      elseif total>tc then sp=sp-(total-tc) end
      -- re-push multi values in correct order (v1 deepest)
      local need=tc-fixed; if need<0 then need=0 end
      for i=need,1,-1 do sp=sp+1 stk[sp]=mv[i] end
    elseif op==${$('STORE')} then local v=stk[sp] sp=sp-1 setV(env,K[ins[2]],v)
    elseif op==${$('SETI')} then local base=stk[sp] sp=sp-1 local v=stk[sp] sp=sp-1 base[K[ins[2]]]=v
    elseif op==${$('SETIEXP')} then local k=stk[sp] sp=sp-1 local base=stk[sp] sp=sp-1 local v=stk[sp] sp=sp-1 base[k]=v
    elseif op==${$('DECL')} then
      local n=ins[2] for i=n,1,-1 do decl(env,K[ins[2+i]],stk[sp-n+i]) end sp=sp-n
    elseif op==${$('ADD')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]+b
    elseif op==${$('SUB')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]-b
    elseif op==${$('MUL')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]*b
    elseif op==${$('DIV')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]/b
    elseif op==${$('MOD')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]%b
    elseif op==${$('POW')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]^b
    elseif op==${$('CAT')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]..b
    elseif op==${$('EQ')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]==b
    elseif op==${$('NE')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]~=b
    elseif op==${$('LT')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]<b
    elseif op==${$('LE')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]<=b
    elseif op==${$('GT')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]>b
    elseif op==${$('GE')} then local b=stk[sp] sp=sp-1 stk[sp]=stk[sp]>=b
    elseif op==${$('IDF')} then local b=stk[sp] sp=sp-1 stk[sp]=math.floor(stk[sp]/b)
    elseif op==${$('BAND')} then local b=stk[sp] sp=sp-1 stk[sp]=bit.band(stk[sp],b)
    elseif op==${$('BOR')} then local b=stk[sp] sp=sp-1 stk[sp]=bit.bor(stk[sp],b)
    elseif op==${$('BXOR')} then local b=stk[sp] sp=sp-1 stk[sp]=bit.bxor(stk[sp],b)
    elseif op==${$('BLSH')} then local b=stk[sp] sp=sp-1 stk[sp]=bit.lshift(stk[sp],b)
    elseif op==${$('BRSH')} then local b=stk[sp] sp=sp-1 stk[sp]=bit.rshift(stk[sp],b)
    elseif op==${$('NEG')} then stk[sp]=-stk[sp]
    elseif op==${$('NOT')} then stk[sp]=not stk[sp]
    elseif op==${$('LEN')} then stk[sp]=#stk[sp]
    elseif op==${$('BNOT')} then stk[sp]=bit.bnot(stk[sp])
    elseif op==${$('AND')} then if not stk[sp] then pc=pc+ins[2] else sp=sp-1 end
    elseif op==${$('OR')} then if stk[sp] then pc=pc+ins[2] else sp=sp-1 end
    elseif op==${$('JMP')} then pc=pc+ins[2]
    elseif op==${$('JF')} then local v=stk[sp] sp=sp-1 if not v then pc=pc+ins[2] end
    elseif op==${$('JT')} then local v=stk[sp] sp=sp-1 if v then pc=pc+ins[2] end
    elseif op==${$('FNUMPREP')} then
      local nm=K[ins[2]] local st=stk[sp] local lim=stk[sp-1] local s2=stk[sp-2] sp=sp-3
      local cell={i=s2,lim=lim,st=st} env.d[nm]=true env.v[nm]=s2 env['_fn_'..nm]=cell
    elseif op==${$('FNUMCHK')} then
      local nm=K[ins[2]] local cell=env['_fn_'..nm]
      local ok=(cell.st>0 and cell.i<=cell.lim)or(cell.st<0 and cell.i>=cell.lim)
      if not ok then pc=pc+ins[3] end
    elseif op==${$('FNUMSTP')} then
      local nm=K[ins[2]] local cell=env['_fn_'..nm]
      cell.i=cell.i+cell.st env.v[nm]=cell.i
    elseif op==${$('FGENPREP')} then
      local nic=ins[2] local names={}
      for i=1,#ins-2 do names[i]=K[ins[2+i]] end
      local iterv={}
      for i=nic,1,-1 do iterv[i]=stk[sp] sp=sp-1 end
      local f,s,ctl=iterv[1],iterv[2],iterv[3]
      env['_fgi']={f=f,s=s,ctl=ctl,names=names}
      for _,nm in ipairs(names) do env.d[nm]=true env.v[nm]=nil end
    elseif op==${$('FGENCHK')} then
      local gi=env['_fgi'] local rs=table.pack(gi.f(gi.s,gi.ctl))
      if rs[1]==nil then pc=pc+ins[3]
      else gi.ctl=rs[1] for i,nm in ipairs(gi.names) do env.v[nm]=rs[i] end end
    elseif op==${$('RET')} then
      local n=ins[2]
      if n==0 then retv=table.pack() retv.n=0
      else
        -- check if last value is a multi-return marker
        local cnt=stk[sp]
        if type(cnt)=='number' and n>0 then
          -- last was multi: cnt is the count of multi values
          local mv={} for i=cnt,1,-1 do mv[cnt-i+1]=stk[sp-cnt+i] end
          sp=sp-cnt-1
          local fixed=n-1
          retv={n=0}
          for i=1,fixed do retv[retv.n+1]=stk[sp-fixed+i] retv.n=retv.n+1 end
          sp=sp-fixed
          for i=1,cnt do retv[retv.n+1]=mv[i] retv.n=retv.n+1 end
        else
          retv={n=n} for i=n,1,-1 do retv[i]=stk[sp-n+i] end sp=sp-n
        end
      end
      done=true
    end
  end
  if retv then return table.unpack(retv,1,retv.n) end
end
${N.vm}(${mainPid},{v={},d={},up=nil,va=table.pack()})`;

  return minify(RT);
}

// ── split loader ──
// Hosting suggestions — different service per chunk for maximum distribution
const _SPLIT_SVC=[
  (i)=>`https://pastefy.app/CHUNK${i}REPLACE/raw`,
  (i)=>`https://raw.githubusercontent.com/YOUR_USER/YOUR_REPO/main/v${i}.bin`,
  (i)=>`https://rentry.co/voidvm${i}/raw`,

  (i)=>`https://ghostbin.com/paste/VOIDX${i}`,
  (i)=>`https://dpaste.com/VOIDVM${i}.txt`,
];

function compileSplitLoader(code){
  // 7-12 chunks, varying sizes so each chunk is a different length (harder to fingerprint)
  const N=rand(7,12);
  const baseSz=Math.floor(code.length/N);
  const pieces=[];
  let pos=0;
  for(let i=0;i<N;i++){
    if(i===N-1){ pieces.push(code.slice(pos)); break; }
    const wobble=rand(0,Math.max(1,Math.floor(baseSz*0.15)));
    const sz=Math.max(1,baseSz+(i%2===0?wobble:-wobble));
    pieces.push(code.slice(pos,pos+sz));
    pos+=sz;
    if(pos>=code.length){ for(let k=i+1;k<N;k++) pieces.push(''); break; }
  }
  const M=pieces.length;

  // Shuffle fetch order so chunk 1 isn't always fetched first
  const order=[...Array(M).keys()];
  for(let i=order.length-1;i>0;i--){const j=rand(0,i);[order[i],order[j]]=[order[j],order[i]];}

  // Per-chunk key + salt for chaotic XOR schedule
  // Encrypt: r = key; for each byte: enc = plain ^ r; r = (r*31 + salt + j) % 251 + 3
  // Decrypt: same formula in same order (XOR is self-inverse)
  const keys=Array.from({length:M},()=>rand(17,239));
  const salts=Array.from({length:M},()=>rand(5,127));
  const chunkFiles=[];
  for(let i=0;i<M;i++){
    const piece=pieces[order[i]];
    const key=keys[i],salt=salts[i];
    const bytes=[];
    let r=key;
    for(let j=0;j<piece.length;j++){
      bytes.push((piece.charCodeAt(j)^r)&0xFF);
      r=(r*31+salt+j)%251+3;
    }
    chunkFiles.push(bytes.join(','));
  }

  const urlPlaceholders=Array.from({length:M},(_,i)=>_SPLIT_SVC[i%_SPLIT_SVC.length](i+1));

  // All lookalike variable names
  const vG=uid(),vU=uid(),vK=uid(),vS=uid(),vO=uid();
  const vD=uid(),vP=uid(),vN=uid(),vC=uid(),vR=uid(),vB=uid(),vJ=uid(),vi=uid();

  const loader=
`local ${vG}=game
if not ${vG} or not ${vG}.HttpGet then return end
local ${vU}={${urlPlaceholders.map(u=>`"${u}"`).join(',')}}
local ${vK}={${keys.join(',')}}
local ${vS}={${salts.join(',')}}
local ${vO}={${order.map(x=>x+1).join(',')}}
local function ${vD}(${vC},${vN})
local ${vR},${vB},${vJ}={},{${vC}:byte(1,-1)},${vK}[${vN}]
for ${vi}=1,#${vB} do
${vR}[${vi}]=string.char(bit32.band(bit32.bxor(${vB}[${vi}],${vJ}),255))
${vJ}=(${vJ}*31+${vS}[${vN}]+${vi}-1)%251+3
end
return table.concat(${vR})
end
local ${vP}={}
for ${vN}=1,#${vU} do
local _ok,${vC}=pcall(function()return ${vG}:HttpGet(${vU}[${vN}])end)
if not _ok then return end
${vP}[${vO}[${vN}]]=${vD}(${vC},${vN})
end
pcall(loadstring(table.concat(${vP})))`;

  const sep='═'.repeat(64);
  const out=[
    '--[[ '+sep,
    '     VOID VM — HYPER DISTRIBUTED SPLIT LOADER  v2',
    '     '+M+' ENCRYPTED CHUNKS · CHAOTIC XOR (key*31+salt+pos) % 251',
    '     '+M+' DIFFERENT HOSTING SERVICES · SHUFFLED FETCH ORDER',
    '     SOURCE CANNOT BE RECONSTRUCTED WITHOUT ALL '+M+' CHUNK FILES + KEYS',
    '     '+sep+' ]]',
    '',
    '--[[ ═══ LOADER SCRIPT — paste into Roblox executor ═══ ]]',
    loader,
    '',
    '--[[ ═══ CHUNK FILES — host each raw content at its URL, then update URLs above ═══ ]]',
    '',
  ];
  for(let i=0;i<M;i++){
    out.push(`--[[ CHUNK ${i+1}/${M}  key=${keys[i]}  salt=${salts[i]}  ]]`);
    out.push(`--[[ SUGGESTED HOST: ${urlPlaceholders[i]} ]]`);
    out.push(`--[[ ALSO WORKS: pastefy.app · rentry.co · paste.ee · ghostbin.com · dpaste.com ]]`);
    out.push('--[[ RAW FILE CONTENT — paste ONLY this line (no comments): ]]');
    out.push(chunkFiles[i]);
    out.push('');
  }
  out.push('--[[ HOW TO USE:');
  out.push('  1. For each CHUNK above, open the suggested hosting site and create a new paste.');
  out.push('  2. Paste ONLY the comma-numbers line as the file content (no comments, no spaces).');
  out.push('  3. Get the raw/direct URL (not the page URL).');
  out.push('  4. In the LOADER SCRIPT above, replace the CHUNK_N_REPLACE placeholder with your URL.');
  out.push('  5. Repeat for all '+M+' chunks across '+M+' different sites.');
  out.push('  6. Run the LOADER SCRIPT from your Roblox executor.');
  out.push('  The loader fetches all chunks, decrypts with chaotic XOR, assembles in order, executes.');
  out.push('  Without every chunk file + secret key, the code is mathematically unrecoverable. ]]');
  return out.join('\n');
}

  let finalCode=header+body;

  if(on('t-wrap')){
    const f=uid(),e2=uid();
    finalCode=`local ${f} = function()\n${finalCode}\nend\nlocal ${e2} = pcall(${f})\n`;
    applied.push('BOOTSTRAP');
  }

  if(on('t-junk')){ finalCode=injectDeadCode(finalCode); applied.push('JUNK-CODE'); setProgress(66); setStatus('COMPILING...','INJECTING JUNK CODE',true); await delay(5); }
  if(on('t-minify')){ finalCode=minify(finalCode); applied.push('MINIFY'); setProgress(72); setStatus('COMPILING...','MINIFYING',true); await delay(5); }

  // VM layers — Deep VM > Flat VM > Classic VM (in priority order)
  if(on('t-deepvm')){
    setProgress(80); setStatus('COMPILING...','DEEP VM → INSTRUCTION TREE (no source)',true); await delay(8);
    try{ finalCode=compileDeepVM(finalCode); applied.push('DEEP-VM'); }
    catch(e){
      outEl.textContent='-- DEEP VM ERROR: '+e.message+'\n-- This construct is not supported by the Deep VM yet.\n-- Try toggling off DEEP VM, or remove the construct.';
      outEl.className='output-box error';
      setStatus('DEEP VM ERROR',e.message,false); showToast('DEEP VM: UNSUPPORTED CONSTRUCT',false); return;
    }
  } else if(on('t-flatvm')){
    setProgress(80); setStatus('COMPILING...','FLAT BYTECODE VM → STACK TUPLES',true); await delay(8);
    try{ finalCode=compileFlatVM(finalCode); applied.push('FLAT-VM'); }
    catch(e){
      outEl.textContent='-- FLAT VM ERROR: '+e.message+'\n-- This construct is not supported yet.\n-- Try toggling off FLAT BYTECODE, or use DEEP VM instead.';
      outEl.className='output-box error';
      setStatus('FLAT VM ERROR',e.message,false); showToast('FLAT VM: UNSUPPORTED CONSTRUCT',false); return;
    }
  } else if(on('t-vm')){
    setProgress(80); setStatus('COMPILING...','VIRTUALIZING → BYTECODE',true); await delay(8);
    finalCode=virtualize(finalCode);
    applied.push('VM');
    if(on('t-vm2')){ setProgress(92); setStatus('COMPILING...','NESTING VM LAYER ×2',true); await delay(8); finalCode=virtualize(finalCode); applied.push('VM²'); }
  }

  if(on('t-split')){
    setProgress(95); setStatus('COMPILING...','GENERATING SPLIT DISTRIBUTED LOADER',true); await delay(5);
    try{ finalCode=compileSplitLoader(finalCode); applied.push('SPLIT-LOADER'); }
    catch(e){ showToast('SPLIT LOADER FAILED: '+e.message,false); }
  }

  setProgress(100); await delay(10); setProgress(0);

  outEl.textContent=finalCode; outEl.className='output-box';
  const ratio=((finalCode.length/src.length)*100).toFixed(0);
  document.getElementById('outStats').textContent=`${finalCode.length} CHARS · ${ratio}% SIZE`;
  setStatus('DONE',applied.join(' → ')+' · runnable Luau',false);
  showToast('COMPILED ✓ — '+applied.length+' LAYERS',true);
}

function copyOutput(){
  const elText=document.getElementById('output').textContent;
  if(!elText||elText.startsWith('-- ')&&elText.includes('appears here')){ showToast('NOTHING TO COPY YET',false); return; }
  navigator.clipboard.writeText(elText)
    .then(()=>showToast('OUTPUT COPIED ✓',true))
    .catch(()=>{
      const sel=window.getSelection(),r=document.createRange();
      r.selectNodeContents(document.getElementById('output'));
      sel.removeAllRanges(); sel.addRange(r);
      try{ document.execCommand('copy'); showToast('COPIED ✓',true); }catch(e){ showToast('SELECT MANUALLY',false); }
    });
}

// ── wiring ──
ready(function(){
  document.querySelectorAll('.toggle').forEach(b=>b.addEventListener('click',()=>b.classList.toggle('on')));
  const inputEl=document.getElementById('input');
  const upd=()=>document.getElementById('lineCount').textContent=inputEl.value.split('\n').length+' LINES';
  inputEl.addEventListener('input',upd); upd();
  // parser load status
  if(window.luaparse){ setStatus('READY','AST → instruction tree · Deep VM · 100% offline · client-side',false); }
  else{
    setStatus('LOADING PARSER...','fetching luaparse from CDN',true);
    setStatus('PARSER ERROR','bundled luaparse failed to initialize — reload the page',false);
  }
  // expose for inline onclick handlers
  window.runObfuscate=runObfuscate;
  window.copyOutput=copyOutput;
});

})();
</script>
