apiVersion: apps/v1
kind: Deployment
metadata:
  name: render3d-grpc
  labels: { app: render3d-grpc }
spec:
  replicas: 2
  selector:
    matchLabels: { app: render3d-grpc }
  template:
    metadata:
      labels: { app: render3d-grpc }
    spec:
      containers:
        - name: grpc
          image: render3d/grpc:latest
          ports: [{ containerPort: 50051 }]
          envFrom:
            - secretRef: { name: render3d-secrets }
---
apiVersion: v1
kind: Service
metadata:
  name: render3d-grpc
spec:
  selector: { app: render3d-grpc }
  ports:
    - port: 50051
      targetPort: 50051
