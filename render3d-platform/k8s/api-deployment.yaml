apiVersion: apps/v1
kind: Deployment
metadata:
  name: render3d-api
  labels: { app: render3d-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: render3d-api }
  template:
    metadata:
      labels: { app: render3d-api }
    spec:
      containers:
        - name: api
          image: render3d/api:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: render3d-secrets }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: render3d-api
spec:
  selector: { app: render3d-api }
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: render3d-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: render3d-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
