<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ferret — Lua / Luau Obfuscator</title>
<meta name="description" content="Free client-side Lua & Roblox Luau obfuscator. Runs entirely in your browser — your code never leaves the page."/>
<link rel="icon" href="data:,"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --blue:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#d29922;
  --purple:#8957e5;--text:#e6edf3;--muted:#8b949e;--dim:#484f58;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header .logo{font-size:1.15rem;font-weight:800;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
header .logo .mark{color:var(--purple)}
.badge{font-size:.6rem;padding:2px 7px;border-radius:99px;font-weight:700;letter-spacing:.4px}
.bpurple{background:#3d1e6e;color:#c8a6ff}
.bgreen{background:#0f2010;color:var(--green)}
.bblue{background:#1e3040;color:var(--blue)}
header .spacer{flex:1}
header nav a{font-size:.8rem;color:var(--muted);margin-left:16px}

.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.opt{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted)}
.opt input[type=checkbox]{accent-color:var(--purple);width:15px;height:15px}
.opt label{cursor:pointer;user-select:none}
.opt input[type=number]{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 7px;width:110px;font-family:inherit;font-size:.8rem}
.tsep{width:1px;height:22px;background:var(--border)}
.btn{border:none;border-radius:6px;padding:7px 15px;font-size:.82rem;font-weight:700;cursor:pointer;transition:.12s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bgo{background:var(--purple);color:#fff}.bgo:hover{background:#7a4bd8}
.bghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.bghost:hover{background:#2d333b}
.spacer{flex:1}

main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);min-height:0}
.pane{background:var(--bg);display:flex;flex-direction:column;min-width:0}
.pane .head{padding:8px 16px;font-size:.72rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.pane .head .stat{font-weight:500;text-transform:none;letter-spacing:0;color:var(--dim)}
.pane .head .spacer{flex:1}
.pane .head .mini{font-size:.7rem;padding:3px 9px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-weight:600}
.pane .head .mini:hover{background:#2d333b}
textarea{flex:1;width:100%;background:var(--bg);color:var(--text);border:none;outline:none;resize:none;padding:14px 16px;font-family:'JetBrains Mono','Consolas','Courier New',monospace;font-size:.82rem;line-height:1.55;tab-size:2}
textarea::placeholder{color:var(--dim)}
#output{white-space:pre;overflow:auto}

.statusbar{background:var(--surface);border-top:1px solid var(--border);padding:6px 20px;font-size:.74rem;color:var(--muted);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.statusbar .ok{color:var(--green)}
.statusbar .err{color:var(--red)}
.note{color:var(--dim)}

@media(max-width:820px){
  main{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  header nav a{margin-left:10px}
}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="mark">🦡</span> ferret <span class="badge bpurple">LUA / LUAU</span></div>
  <span class="badge bgreen">100% CLIENT-SIDE</span>
  <div class="spacer"></div>
  <nav>
    <a href="/deobfuscator.html">Deobfuscator</a>
    <a href="https://github.com/robloxscripter6245366542/roblox-lua-obscator" target="_blank" rel="noopener">GitHub</a>
  </nav>
</header>

<div class="toolbar">
  <div class="opt" title="Integer literals become arithmetic expressions">
    <input type="checkbox" id="lNumbers" checked><label for="lNumbers">Numbers</label>
  </div>
  <div class="opt" title="String literals are encrypted and decoded at runtime">
    <input type="checkbox" id="lStrings" checked><label for="lStrings">Strings</label>
  </div>
  <div class="opt" title="Encrypt the whole chunk and emit a loader (recommended)">
    <input type="checkbox" id="lPack" checked><label for="lPack">Pack (encrypt&nbsp;+&nbsp;loader)</label>
  </div>
  <div class="tsep"></div>
  <div class="opt">
    <label for="seed">Seed</label>
    <input type="number" id="seed" value="7" min="0" max="2147483647">
    <button class="mini bghost" id="randSeed" style="padding:4px 9px;font-size:.72rem" title="Random seed">🎲</button>
  </div>
  <div class="spacer"></div>
  <button class="btn bghost" id="sample">Load sample</button>
  <button class="btn bgo" id="run">Obfuscate ▸</button>
</div>

<main>
  <section class="pane">
    <div class="head">Input <span class="stat" id="inStat">0 bytes</span>
      <div class="spacer"></div>
      <span class="mini" id="clear">Clear</span>
    </div>
    <textarea id="input" spellcheck="false" placeholder="-- Paste your Lua / Luau script here&#10;print('hello world')"></textarea>
  </section>
  <section class="pane">
    <div class="head">Output <span class="stat" id="outStat">—</span>
      <div class="spacer"></div>
      <span class="mini" id="copy">Copy</span>
      <span class="mini" id="download">Download</span>
    </div>
    <textarea id="output" spellcheck="false" readonly placeholder="-- Obfuscated output appears here"></textarea>
  </section>
</main>

<div class="statusbar">
  <span id="status">Ready.</span>
  <div class="spacer" style="flex:1"></div>
  <span class="note">Everything runs in your browser — your code is never uploaded. Output runs on Lua 5.1–5.4 &amp; Roblox Luau.</span>
</div>

<script src="ferret.web.js"></script>
<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var input=$("input"), output=$("output"), status=$("status");
  var inStat=$("inStat"), outStat=$("outStat");

  var SAMPLE =
'-- sample Roblox-style script\n' +
'local Players = game and game:GetService("Players")\n' +
'local Config = { name = "ferret demo", speed = 16, keys = {"a","b","c"} }\n\n' +
'local function greet(who)\n' +
'  return "hello, " .. tostring(who) .. "!"\n' +
'end\n\n' +
'for i = 1, #Config.keys do\n' +
'  print(i, Config.keys[i], greet(Config.name))\n' +
'end\n\n' +
'local total = 0\n' +
'for _, n in ipairs({10, 20, 30, 42}) do total = total + n end\n' +
'print("total =", total, "speed =", Config.speed)\n';

  function fmtBytes(n){
    if(n<1024) return n+" bytes";
    return (n/1024).toFixed(1)+" KB";
  }
  function updateInStat(){ inStat.textContent = fmtBytes(input.value.length); }

  function selectedLayers(){
    var L=[];
    if($("lNumbers").checked) L.push("numbers");
    if($("lStrings").checked) L.push("strings");
    if($("lPack").checked) L.push("pack");
    return L;
  }

  function run(){
    var src = input.value;
    if(!src.trim()){ status.innerHTML='<span class="err">Nothing to obfuscate — paste some Lua first.</span>'; return; }
    var layers = selectedLayers();
    if(layers.length===0){ status.innerHTML='<span class="err">Select at least one layer.</span>'; return; }
    var seed = parseInt($("seed").value,10); if(isNaN(seed)) seed=7;
    var t0 = performance.now();
    try{
      var out = Ferret.obfuscate(src, { seed: seed, layers: layers, chunkname: "input.lua" });
      output.value = out;
      var ms = (performance.now()-t0).toFixed(0);
      var ratio = src.length ? (out.length/src.length).toFixed(1) : "0";
      outStat.textContent = fmtBytes(out.length)+"  ("+ratio+"×)";
      status.innerHTML = '<span class="ok">✓ Obfuscated</span> — '+fmtBytes(src.length)+' → '+fmtBytes(out.length)+
        '  ·  layers: '+layers.join(", ")+'  ·  seed '+seed+'  ·  '+ms+' ms';
    }catch(e){
      output.value="";
      outStat.textContent="—";
      status.innerHTML='<span class="err">✗ '+(e && e.message ? e.message : e)+'</span>';
    }
  }

  $("run").onclick = run;
  $("sample").onclick = function(){ input.value=SAMPLE; updateInStat(); run(); };
  $("clear").onclick = function(){ input.value=""; output.value=""; updateInStat(); outStat.textContent="—"; status.textContent="Ready."; };
  $("randSeed").onclick = function(){ $("seed").value = Math.floor(Math.random()*2147483647); };
  input.addEventListener("input", updateInStat);
  input.addEventListener("keydown", function(e){
    if((e.ctrlKey||e.metaKey) && e.key==="Enter"){ e.preventDefault(); run(); }
  });
  $("copy").onclick = function(){
    if(!output.value) return;
    navigator.clipboard.writeText(output.value).then(function(){
      var el=$("copy"); var t=el.textContent; el.textContent="Copied!"; setTimeout(function(){el.textContent=t;},1200);
    });
  };
  $("download").onclick = function(){
    if(!output.value) return;
    var blob = new Blob([output.value], {type:"text/plain"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "obfuscated.lua";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  };

  updateInStat();
})();
</script>
</body>
</html>
