name: luau-vm CI

on:
  push:
    paths:
      - 'luau-vm/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'luau-vm/**'

defaults:
  run:
    working-directory: luau-vm

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.4
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: VM core (hand-assembled bytecode)
        run: lua5.4 test/vmcore_test.lua

      - name: Equivalence (native vs VM, direct + serialized)
        run: lua5.4 test/verify.lua

      - name: Property-based differential tests
        run: lua5.4 test/property.lua 300

      - name: Differential fuzzer (fixed seed, reproducible)
        run: lua5.4 test/fuzz.lua 3000 1

      - name: Determinism / reproducible builds
        run: lua5.4 test/determinism.lua

      - name: Hardening (opcode permutation, encryption, key factoring, bundle)
        run: lua5.4 test/harden.lua

      - name: Custom bytecode cipher (permute/S-box/mask/checksum round-trip)
        run: lua5.4 test/cipher.lua

      - name: Sealed/streamed execution + instruction mutation
        run: lua5.4 test/seal_test.lua

      - name: Serializer constant round-trip (subtype, -0.0, large int, inf/nan)
        run: lua5.4 test/serialize.lua

      - name: Per-opcode coverage (every emittable opcode, validated + diffed)
        run: lua5.4 test/opcode_coverage.lua

      - name: Language compatibility suite (hundreds of differential cases)
        run: lua5.4 test/compat.lua

      - name: Malformed-bytecode fuzzer (loader must never crash the host)
        run: lua5.4 test/fuzz_bytecode.lua 5000 1

      - name: Benchmark (smoke)
        run: lua5.4 bench/bench.lua
